<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="../../images/favicon-32.png">
<title>美鴻添富 試算工具 · 鼎綸恩宇</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Bebas+Neue&family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --orange:#F05A28;--orange-dark:#D04618;--orange-light:#FDE8DF;
  --teal:#1A6B72;--teal-dark:#0F4D52;--teal-light:#D0EAEC;
  --navy:#0D2A3A;--navy-mid:#0a2334;--navy-light:#1E4762;
  --gold:#E8A020;--gold-dark:#b07800;--gold-light:#FEF3E0;
  --jade:#0f766e;--jade-light:#D1F2EE;
  --white:#fff;--light:#F8F5F0;--bg:#F2EFE9;
  --row-alt:#FAF7F1;--row-hover:#FFF6E8;
  --border:#E5E0D3;
  --text:var(--navy);
  --text-muted:#6B7280;
  /* Gender-driven accent (set on body) */
  --accent:var(--teal);
  --accent-dark:var(--teal-dark);
  --accent-light:var(--teal-light);
  --accent-bg:rgba(26,107,114,0.06);
}
body.theme-female{
  --accent:#C2185B;
  --accent-dark:#8C0F40;
  --accent-light:#FCE4EC;
  --accent-bg:rgba(194,24,91,0.05);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);font-family:'Noto Sans TC',sans-serif;color:var(--text);font-size:14px;line-height:1.55;}

/* ===== HEADER ===== */
.topbar{background:linear-gradient(135deg,var(--navy-mid) 0%,var(--navy) 60%,var(--navy-light) 100%);color:#fff;padding:14px 28px;display:flex;align-items:center;gap:18px;box-shadow:0 4px 20px rgba(0,0,0,.15);position:sticky;top:0;z-index:50;}
.topbar a.back{color:rgba(255,255,255,.7);text-decoration:none;font-size:12px;padding:6px 12px;border:1px solid rgba(255,255,255,.2);border-radius:6px;transition:all .2s;display:flex;align-items:center;gap:6px;}
.topbar a.back:hover{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.4);}
.topbar .brand{display:flex;align-items:center;gap:14px;}
.topbar .brand img{height:32px;width:auto;background:rgba(255,255,255,.95);padding:4px 6px;border-radius:6px;}
.topbar .brand-text{display:flex;flex-direction:column;line-height:1.15;}
.topbar .brand-text .b1{font-size:13px;font-weight:900;letter-spacing:1px;color:var(--orange);}
.topbar .brand-text .b2{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:1.5px;}
.topbar .spacer{flex:1;}
.topbar .product-tag{font-size:11px;color:rgba(255,255,255,.6);letter-spacing:2px;text-align:right;}
.topbar .product-tag b{display:block;font-size:13px;color:rgba(255,255,255,.9);font-weight:700;margin-top:2px;letter-spacing:0;}

/* ===== PRODUCT HERO ===== */
.product-hero{background:#fff;padding:20px 28px;border-bottom:3px solid var(--orange);box-shadow:0 1px 4px rgba(0,0,0,.04);}
.product-hero-inner{max-width:1500px;margin:0 auto;display:flex;align-items:center;gap:22px;flex-wrap:wrap;}
.product-hero .ph-logo{display:flex;align-items:center;justify-content:center;padding:10px 14px;background:#fafafa;border:1px solid var(--border);border-radius:10px;height:64px;}
.product-hero .ph-logo img{height:42px;width:auto;object-fit:contain;}
.product-hero .ph-info{flex:1;min-width:240px;}
.product-hero .ph-company{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:2px;margin-bottom:2px;}
.product-hero .ph-name{font-size:20px;font-weight:900;color:var(--navy);letter-spacing:.5px;margin-bottom:4px;}
.product-hero .ph-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:11px;color:var(--text-muted);}
.product-hero .ph-meta span code{background:var(--gold-light);color:var(--gold-dark);padding:2px 6px;border-radius:4px;font-weight:700;margin-right:4px;}
.product-hero .ph-actions{display:flex;gap:8px;}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;letter-spacing:.5px;transition:all .2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none;}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:hover{background:var(--orange-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(240,90,40,.3);}
.btn-ghost{background:#fff;color:var(--navy);border:1.5px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-jade{background:var(--jade);color:#fff;}
.btn-jade:hover{background:#0c5f59;}

/* ===== LAYOUT ===== */
.container{max-width:1500px;margin:0 auto;padding:18px;display:grid;grid-template-columns:340px 1fr;gap:18px;}
@media (max-width:1100px){.container{grid-template-columns:1fr;}}

.card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(13,42,58,.05),0 8px 24px rgba(13,42,58,.04);overflow:hidden;}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,#fff,#fafafa);}
.card-header h2{font-size:14px;font-weight:900;color:var(--navy);letter-spacing:1px;display:flex;align-items:center;gap:8px;}
.card-header h2::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px;}
.card-body{padding:18px;}

/* ===== FORM ===== */
.field{margin-bottom:14px;}
.field label{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-muted);margin-bottom:5px;font-weight:600;letter-spacing:1px;}
.field label .hint{font-size:10px;color:var(--accent);font-weight:700;}
.input,select.input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:var(--text);transition:all .15s;}
.input:focus,select.input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg);}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.seg{display:flex;gap:0;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;background:#fafafa;}
.seg input{display:none;}
.seg label{flex:1;text-align:center;padding:8px 6px;cursor:pointer;margin:0;background:transparent;color:var(--text-muted);font-size:12px;font-weight:700;letter-spacing:1px;transition:all .15s;}
.seg input:checked + label{background:var(--accent);color:#fff;box-shadow:inset 0 -2px 0 var(--accent-dark);}
body.theme-female .seg input[value="M"]:checked + label{background:var(--teal);box-shadow:inset 0 -2px 0 var(--teal-dark);}
body.theme-male .seg input[value="F"]:checked + label{background:#C2185B;box-shadow:inset 0 -2px 0 #8C0F40;}

.age-badge{display:inline-flex;align-items:center;gap:4px;background:var(--orange);color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:900;letter-spacing:.5px;}
.year-parse{font-size:10px;color:var(--accent);font-weight:700;margin-top:4px;}

.summary{background:linear-gradient(135deg,var(--gold-light) 0%,#FEF8E8 100%);border:1px solid #F2D78A;border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.summary-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0;}
.summary-row + .summary-row{border-top:1px dashed rgba(176,120,0,.2);}
.summary-row span:first-child{color:#7c5500;}
.summary-row strong{color:var(--navy);font-weight:900;font-variant-numeric:tabular-nums;}
.summary-row.highlight{margin-top:4px;padding-top:8px;border-top:2px solid var(--gold-dark);}
.summary-row.highlight strong{color:var(--orange-dark);font-size:16px;}

.discount-card{background:var(--accent-bg);border-left:3px solid var(--accent);padding:10px 12px;border-radius:6px;font-size:11px;line-height:1.7;margin-bottom:14px;}
.discount-card .dc-title{font-size:11px;font-weight:700;color:var(--accent-dark);margin-bottom:4px;letter-spacing:1px;}
.discount-row{display:flex;justify-content:space-between;align-items:center;}
.discount-row b{color:var(--accent-dark);font-variant-numeric:tabular-nums;}
.discount-row.total{margin-top:4px;padding-top:6px;border-top:1px dashed rgba(0,0,0,.1);font-weight:700;}

.rate-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1.5px dashed var(--gold);border-radius:8px;margin-bottom:14px;}
.toggle{position:relative;display:inline-block;width:38px;height:20px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;transition:.2s;border-radius:20px;}
.toggle .slider::before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;transition:.2s;border-radius:50%;}
.toggle input:checked + .slider{background:var(--gold);}
.toggle input:checked + .slider::before{transform:translateX(18px);}
.rate-toggle .rt-text{font-size:11px;color:var(--text-muted);flex:1;}
.rate-toggle .rt-text b{color:var(--navy);}
.rate-toggle input.rate-input{width:60px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;}

/* ===== RIGHT PANEL ===== */
.scenario-tabs{display:flex;gap:0;padding:0 18px;background:#fafafa;border-bottom:1px solid var(--border);}
.scenario-tabs button{border:none;background:transparent;color:var(--text-muted);padding:11px 18px;cursor:pointer;font-size:13px;font-weight:700;letter-spacing:1px;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:inherit;}
.scenario-tabs button:hover{color:var(--accent);}
.scenario-tabs button.active{color:var(--orange);border-bottom-color:var(--orange);}
.scenario-tabs .right{margin-left:auto;display:flex;align-items:center;gap:6px;padding:7px 0;}
.seg-mini{display:flex;background:#fff;border:1.5px solid var(--border);border-radius:7px;overflow:hidden;}
.seg-mini button{border:none;background:transparent;color:var(--text-muted);padding:6px 12px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:1px;font-family:inherit;}
.seg-mini button.active{background:var(--navy);color:#fff;}

.notice{padding:10px 18px;font-size:11.5px;background:var(--jade-light);color:var(--jade);border-bottom:1px solid #b8e0db;line-height:1.7;}
.notice b{color:#0c5f59;}

/* ===== CHARTS ===== */
.charts-wrap{padding:18px;border-bottom:1px solid var(--border);background:#fcfcfa;}
.chart-row{display:grid;grid-template-columns:1fr;gap:14px;}
.chart-box{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;}
.chart-box h3{font-size:12px;font-weight:700;color:var(--navy);letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.chart-box h3 .sub{font-size:10px;color:var(--text-muted);font-weight:500;}
.chart-canvas-wrap{position:relative;height:260px;}

/* ===== TABLE ===== */
.table-wrap{overflow-x:auto;max-height:calc(100vh - 240px);overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums;}
thead{position:sticky;top:0;z-index:2;}
thead tr.h1 th{background:linear-gradient(180deg,var(--navy),var(--navy-mid));color:#fff;padding:8px 6px;font-weight:700;font-size:11px;letter-spacing:1px;border-right:1px solid rgba(255,255,255,.15);}
thead tr.h2 th{background:var(--gold-light);color:var(--navy);padding:7px 6px;font-weight:700;font-size:11px;border:1px solid var(--border);}
thead tr.h2 th.guaranteed{background:#FEF3E0;}
thead tr.h2 th.non-guaranteed{background:var(--orange-light);color:var(--orange-dark);}
thead tr.h2 th.terminal{background:#FFF1D1;}
thead tr.h2 th.total{background:var(--jade-light);color:var(--jade);}

tbody td{padding:7px 8px;border:1px solid var(--border);text-align:right;}
tbody td.text-center{text-align:center;font-weight:700;color:var(--navy);}
tbody tr:nth-child(even) td{background:var(--row-alt);}
tbody tr:hover td{background:var(--row-hover);}
tbody td.zero{color:#bbb;}
tbody td.pay-yr{font-weight:700;color:var(--orange-dark);}
tbody td.col-total{background:var(--jade-light) !important;font-weight:700;color:var(--jade);}
tbody tr:hover td.col-total{background:#B7E2DC !important;}

/* 隱藏 USD 那排重複的 hdr-unit row 已經拿掉,直接不寫 */

/* 詳細/要點 視圖切換 */
body[data-view="summary"] .col-detail{display:none;}

.legend{padding:12px 18px;font-size:10.5px;color:var(--text-muted);background:#fafafa;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:14px;}
.legend code{background:var(--gold-light);color:var(--gold-dark);padding:1px 6px;border-radius:3px;font-weight:700;margin-right:3px;}

/* === BREAK-EVEN HIGHLIGHT === */
tbody tr.break-even td{box-shadow:inset 0 -2px 0 var(--jade);}
tbody tr.break-even td.text-center::after{content:'⇣回本';font-size:9px;color:var(--jade);font-weight:700;margin-left:4px;}

/* ===== PRINT ===== */
@media print {
  @page { size: A4 landscape; margin: 10mm; }
  body { background: white; font-size: 10px; }
  .topbar, .scenario-tabs, .product-hero .ph-actions, .charts-wrap, .legend { display:none !important; }
  .container { display: block; padding: 0; max-width: none; }
  .card { box-shadow: none; border:1px solid #999; border-radius:0; page-break-inside: avoid; }
  .card-input { display: none !important; }
  .product-hero { padding: 8px 0; border-bottom:2px solid var(--navy); }
  .product-hero .ph-name { font-size: 16px; }
  .product-hero .ph-meta { font-size: 9px; }
  .table-wrap { max-height: none; overflow: visible; }
  table { font-size: 9px; }
  thead tr.h1 th { background: var(--navy) !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  thead tr.h2 th { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  tbody tr:nth-child(even) td { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  tbody td.col-total { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  tbody tr { page-break-inside: avoid; }
  thead { display: table-header-group; }
  .print-footer { display: block !important; }
}
.print-footer{display:none;padding:8px 0;font-size:9px;color:#666;border-top:1px solid #ccc;margin-top:10px;line-height:1.5;}
</style>
</head>
<body class="theme-male" data-view="detail">

<div class="topbar">
  <a href="../" class="back">← 返回主頁</a>
  <div class="brand">
    <img src="../../images/favicon-32.png" alt="鼎綸" onerror="this.style.display='none'">
    <div class="brand-text">
      <span class="b1">恩宇體系</span>
      <span class="b2">鼎綸保險經紀人</span>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="product-tag">
    高精度試算工具
    <b>美元分紅終身壽險</b>
  </div>
</div>

<div class="product-hero">
  <div class="product-hero-inner">
    <div class="ph-logo">
      <img id="company-logo" src="" alt="保險公司 LOGO" onerror="this.style.display='none'">
    </div>
    <div class="ph-info">
      <div class="ph-company" id="company-name">—</div>
      <div class="ph-name" id="product-name">商品試算工具</div>
      <div class="ph-meta">
        <span><code id="meta-code">UPD061/UPD101</code>商品代碼</span>
        <span><code id="meta-approval">—</code>核准文號</span>
        <span><code id="meta-effective">—</code>啟用日期</span>
        <span id="rates-status" style="color:var(--jade)">資料載入中…</span>
      </div>
    </div>
    <div class="ph-actions">
      <button class="btn btn-ghost" onclick="window.print()">🖨 列印 PDF</button>
      <button class="btn btn-ghost" onclick="exportCSV()">↓ CSV</button>
    </div>
  </div>
</div>

<div class="container">
  <!-- LEFT: INPUTS -->
  <div class="card card-input">
    <div class="card-header"><h2>試算條件</h2></div>
    <div class="card-body">

      <div class="field">
        <label>被保險人姓名</label>
        <input class="input" type="text" id="name" value="被保人">
      </div>

      <div class="field">
        <label>性別</label>
        <div class="seg">
          <input type="radio" id="sex-m" name="sex" value="M" checked>
          <label for="sex-m">男性</label>
          <input type="radio" id="sex-f" name="sex" value="F">
          <label for="sex-f">女性</label>
        </div>
      </div>

      <div class="field">
        <label>
          年齡輸入方式
          <span id="age-badge" class="age-badge">保險年齡 0</span>
        </label>
        <div class="seg">
          <input type="radio" id="age-mode-bday" name="age-mode" value="bday" checked>
          <label for="age-mode-bday">出生日期</label>
          <input type="radio" id="age-mode-direct" name="age-mode" value="direct">
          <label for="age-mode-direct">直接輸入</label>
        </div>
      </div>

      <div class="field" id="bday-block">
        <label>出生日期 <span class="hint">民國或西元皆可</span></label>
        <div class="row-3">
          <input class="input" type="number" id="bd-y" value="60" placeholder="年">
          <input class="input" type="number" id="bd-m" value="1" min="1" max="12" placeholder="月">
          <input class="input" type="number" id="bd-d" value="1" min="1" max="31" placeholder="日">
        </div>
        <div class="year-parse" id="year-parse"></div>
      </div>

      <div class="field" id="direct-block" style="display:none;">
        <label>保險年齡(歲)</label>
        <input class="input" type="number" id="direct-age" value="55" min="0" max="75">
      </div>

      <div class="field">
        <label>險種 / 繳費年期</label>
        <select class="input" id="plan">
          <option value="UPD061">UPD061 · 六年期</option>
          <option value="UPD101">UPD101 · 十年期</option>
        </select>
      </div>

      <div class="row-2">
        <div class="field">
          <label>繳別</label>
          <select class="input" id="freq">
            <option value="年繳" selected>年繳</option>
            <option value="半年繳">半年繳</option>
            <option value="季繳">季繳</option>
            <option value="月繳">月繳</option>
          </select>
        </div>
        <div class="field">
          <label>投保金額 <span class="hint">萬美元</span></label>
          <input class="input" type="number" id="face" value="100" min="1" step="1">
        </div>
      </div>

      <div class="rate-toggle">
        <label class="toggle">
          <input type="checkbox" id="show-twd">
          <span class="slider"></span>
        </label>
        <span class="rt-text">換算 <b>新台幣</b> 顯示</span>
        <input class="input rate-input" type="number" id="fx-rate" value="32" min="20" max="50" step="0.1">
      </div>

      <div id="input-err" style="color:#dc2626;font-size:11px;margin-bottom:10px;"></div>

      <div class="summary" id="summary"></div>

      <div class="discount-card" id="discount-info"></div>

    </div>
  </div>

  <!-- RIGHT: OUTPUT -->
  <div class="card">
    <div class="scenario-tabs">
      <button class="active" data-scenario="M" onclick="setScenario('M')">最可能紅利 (中分紅)</button>
      <button data-scenario="L" onclick="setScenario('L')">較低紅利</button>
      <button data-scenario="Z" onclick="setScenario('Z')">紅利為零</button>
      <div class="right">
        <div class="seg-mini">
          <button class="active" data-view="detail" onclick="setView('detail')">詳細</button>
          <button data-view="summary" onclick="setView('summary')">要點</button>
        </div>
      </div>
    </div>

    <div class="notice" id="notice"></div>

    <div class="charts-wrap">
      <div class="chart-box">
        <h3>累計保費 vs 身故總和 vs 解約總和 <span class="sub" id="chart-sub">逐年累積走勢</span></h3>
        <div class="chart-canvas-wrap"><canvas id="chart-main"></canvas></div>
      </div>
    </div>

    <div class="table-wrap" id="table-wrap"></div>

    <div class="legend">
      <span><code>A</code>當年度實繳保費</span>
      <span><code>B</code>累計實繳保費</span>
      <span><code>C</code>基本身故金</span>
      <span><code>D</code>基本解約金</span>
      <span><code>E</code>累計增額面額</span>
      <span><code>F</code>增額身故</span>
      <span><code>G</code>增額解約</span>
      <span><code>H</code>終期保額紅利</span>
      <span><code>I</code>終期現金紅利</span>
      <span><code>J = C+F+H</code></span>
      <span><code>K = D+G+I</code></span>
    </div>

    <div class="print-footer" id="print-footer"></div>
  </div>
</div>

<script>
// ================= STATE =================
let RATES = null;
let scenario = 'M';
let view = 'detail';
let chart = null;
const ROC_OFFSET = 1911;

const $ = (id) => document.getElementById(id);

// ================= FORMATTING =================
function fmt(n, dec = 2) {
  if (n === 0 || n == null || isNaN(n)) return '0';
  if (Math.abs(n) < 0.005 && dec <= 2) return '0';
  return n.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function fmtInt(n) {
  return n == null || isNaN(n) ? '0' : Math.round(n).toLocaleString('en-US');
}

// ================= LOAD RATES =================
async function loadRates() {
  try {
    const res = await fetch('data/skl/UPD061_UPD101_2026-04.json');
    if (!res.ok) throw new Error('費率 JSON 載入失敗 (' + res.status + ')');
    RATES = await res.json();
    // populate header
    $('company-name').textContent = RATES.company_name || '新光人壽';
    $('product-name').textContent = RATES.product_name || '美鴻添富美元分紅終身壽險';
    $('company-logo').src = RATES.company_logo || '../../images/img_05_1d05f38a7f49.png';
    $('meta-approval').textContent = RATES.approval_no || '—';
    $('meta-effective').textContent = RATES.effective_date || '—';
    $('rates-status').textContent = '✓ 已載入官方費率';
    recalc();
  } catch (e) {
    $('rates-status').textContent = '❌ ' + e.message;
    $('rates-status').style.color = '#fcd34d';
  }
}

// ================= AGE LOGIC =================
// Auto-detect 民國 vs 西元
function parseYear(y) {
  // y = number user entered.
  // If 1..199 → 民國年; if 1900+ → 西元
  if (y == null || isNaN(y)) return null;
  if (y >= 1 && y <= 200) return { rocYear: y, adYear: y + ROC_OFFSET, label: `民國 ${y} 年 / 西元 ${y + ROC_OFFSET} 年` };
  if (y >= 1900) return { rocYear: y - ROC_OFFSET, adYear: y, label: `西元 ${y} 年 / 民國 ${y - ROC_OFFSET} 年` };
  return null;
}
function insuranceAgeByBday(adYear, m, d) {
  const today = new Date();
  const bd = new Date(adYear, (m - 1), d);
  let age = today.getFullYear() - bd.getFullYear();
  if (today.getMonth() < bd.getMonth() ||
      (today.getMonth() === bd.getMonth() && today.getDate() < bd.getDate())) {
    age--;
  }
  // 半歲進位
  const half = new Date(bd.getFullYear() + age, bd.getMonth() + 6, bd.getDate());
  if (today >= half) age++;
  return Math.max(0, age);
}

// ================= DISCOUNT (TIERED) =================
function getDiscount(faceUSD) {
  const tiers = RATES.discounts.high_premium_tiers || [];
  let hp = 0;
  for (const t of tiers) {
    if (faceUSD >= t.min_usd && faceUSD <= t.max_usd) { hp = t.rate; break; }
  }
  return {
    high_prem: hp,
    first_period: RATES.discounts.first_period,
    renewal: RATES.discounts.renewal,
    first_total: hp + RATES.discounts.first_period,
    renew_total: hp + RATES.discounts.renewal,
  };
}

// ================= CALC =================
function calculate(inp) {
  const { plan, sex, age, faceWan, freq } = inp;
  const prod = RATES.products.find(p => p.code === plan);
  if (!prod) throw new Error('找不到產品');
  if (age < prod.min_age || age > prod.max_age)
    throw new Error(`此商品承保年齡 ${prod.min_age}-${prod.max_age},您的保險年齡為 ${age}`);

  const gp = RATES.gp[plan]?.[sex]?.[age];
  if (gp == null) throw new Error('費率表未涵蓋此 (險種/性別/年齡)');

  const faceUSD = faceWan * 10000;
  const orig = gp * faceWan * 10;
  const discount = getDiscount(faceUSD);
  const freqFactor = RATES.pay_freq_factors[freq];
  const periods = RATES.pay_freq_periods[freq];

  const origPerPeriod = orig * freqFactor;
  const firstPerPeriod = Math.round(origPerPeriod * (1 - discount.first_total));
  const renewPerPeriod = Math.round(origPerPeriod * (1 - discount.renew_total));
  const firstAnnualPaid = firstPerPeriod * periods;
  const renewAnnualPaid = renewPerPeriod * periods;

  const payYears = prod.pay_years;
  const lastYear = prod.mature_age - age;
  const uvBySex = RATES.uv[plan][sex];
  const divBySex = RATES.div[plan][sex];
  const corr = RATES.corridor[plan];
  const ageU = uvBySex[age] || [];
  const ageD = divBySex[age] || [];

  const rows = [];
  let cumP = 0, cumE = 0;
  for (let yr = 1; yr <= lastYear; yr++) {
    const isPay = yr <= payYears;
    const A = isPay ? (yr === 1 ? firstAnnualPaid : renewAnnualPaid) : 0;
    cumP += A;
    const C = Math.round((corr[yr] || 0) * faceUSD);
    const uv = ageU[yr] || [0, 0, 0];
    const D = uv[1] * faceWan * 10;
    const NSP = uv[2];
    const dv = ageD[yr] || [0,0,0,0,0,0];
    const dvP = ageD[yr-1] || [0,0,0,0,0,0];
    const AD = (scenario==='M'?dv[0]:scenario==='L'?dv[3]:0) * faceWan * 10;
    const TDD = (scenario==='M'?dvP[1]:scenario==='L'?dvP[4]:0) * faceWan * 10;
    const TDS = (scenario==='M'?dvP[2]:scenario==='L'?dvP[5]:0) * faceWan * 10;
    const bought = (AD>0 && NSP>0) ? Math.round(AD/NSP*1000) : 0;
    cumE += bought;
    const F = cumE > 0 ? Math.round(cumE * (corr[yr] ?? 1)) : 0;
    const G = cumE > 0 ? Math.round(cumE * NSP / 1000 * 100) / 100 : 0;
    const J = C + F + TDD;
    const K = D + G + TDS;
    rows.push({
      yr, attainedAge: age + yr - 1, A, cumP, C, D, E: cumE, F, G,
      H: TDD, I: TDS, J, K, isPay
    });
  }
  return {
    rows, prod, gp, discount,
    origPerPeriod, firstPerPeriod, renewPerPeriod,
    firstAnnualPaid, renewAnnualPaid,
    totalPaid: firstAnnualPaid + renewAnnualPaid * (payYears - 1),
  };
}

// ================= RENDER =================
function getInputs() {
  const sex = document.querySelector('input[name="sex"]:checked').value;
  const ageMode = document.querySelector('input[name="age-mode"]:checked').value;
  let age, bdayLabel = '';
  if (ageMode === 'direct') {
    age = +$('direct-age').value || 0;
  } else {
    const yEntry = +$('bd-y').value;
    const parsed = parseYear(yEntry);
    if (!parsed) { age = 0; bdayLabel = '⚠ 年份格式錯誤'; }
    else {
      bdayLabel = parsed.label;
      const m = +$('bd-m').value || 1;
      const d = +$('bd-d').value || 1;
      age = insuranceAgeByBday(parsed.adYear, m, d);
    }
  }
  $('year-parse').textContent = bdayLabel;
  return {
    sex, age,
    plan: $('plan').value,
    freq: $('freq').value,
    faceWan: +$('face').value || 0,
    showTwd: $('show-twd').checked,
    fxRate: +$('fx-rate').value || 32,
  };
}

function recalc() {
  if (!RATES) return;
  $('input-err').textContent = '';
  const inp = getInputs();
  $('age-badge').textContent = `保險年齡 ${inp.age}`;

  // body theme by gender
  document.body.classList.toggle('theme-male', inp.sex === 'M');
  document.body.classList.toggle('theme-female', inp.sex === 'F');

  let result;
  try { result = calculate(inp); }
  catch (e) {
    $('input-err').textContent = e.message;
    $('summary').innerHTML = '';
    $('discount-info').innerHTML = '';
    $('table-wrap').innerHTML = '';
    $('notice').textContent = '';
    if (chart) { chart.destroy(); chart = null; }
    return;
  }
  renderSummary(result, inp);
  renderDiscount(result, inp);
  renderNotice(result, inp);
  renderTable(result, inp);
  renderChart(result, inp);
  renderPrintFooter(inp);
}

// ----- currency display helpers -----
function showAmount(usd, inp) {
  if (!inp.showTwd) return 'USD ' + fmtInt(usd);
  return 'NT$ ' + fmtInt(usd * inp.fxRate);
}
function showAmountDec(usd, inp) {
  if (!inp.showTwd) return fmt(usd);
  return fmt(usd * inp.fxRate);
}

function renderSummary(r, inp) {
  const curLabel = inp.showTwd ? `NT$ (×${inp.fxRate})` : 'USD';
  $('summary').innerHTML = `
    <div class="summary-row"><span>每期原始保費</span><strong>${showAmount(r.origPerPeriod, inp)}</strong></div>
    <div class="summary-row"><span>每期折扣後 (首期)</span><strong>${showAmount(r.firstPerPeriod, inp)}</strong></div>
    <div class="summary-row"><span>每期折扣後 (續期)</span><strong>${showAmount(r.renewPerPeriod, inp)}</strong></div>
    <div class="summary-row highlight"><span>第一年實繳 ${inp.freq}</span><strong>${showAmount(r.firstAnnualPaid, inp)}</strong></div>
    <div class="summary-row"><span>總實繳保費 (${r.prod.pay_years}年)</span><strong>${showAmount(r.totalPaid, inp)}</strong></div>
    <div class="summary-row" style="font-size:10px;color:#999;justify-content:flex-end;">幣別:${curLabel}</div>
  `;
}

function renderDiscount(r, inp) {
  const d = r.discount;
  const pct = (x) => (x * 100).toFixed(1) + '%';
  $('discount-info').innerHTML = `
    <div class="dc-title">📋 此保件適用折扣</div>
    <div class="discount-row"><span>高保費折扣 <small style="color:#999">(投保金額 ${(r.prod && inp.faceWan*10000>=20000)?'≥ 2 萬':inp.faceWan*10000>=15000?'1.5-2 萬':inp.faceWan*10000>=10000?'1-1.5 萬':'< 1 萬'}美元)</small></span><b>${pct(d.high_prem)}</b></div>
    <div class="discount-row"><span>首期繳費折扣 (轉帳)</span><b>${pct(d.first_period)}</b></div>
    <div class="discount-row"><span>續期繳費折扣 (轉帳)</span><b>${pct(d.renewal)}</b></div>
    <div class="discount-row total"><span>首期合計</span><b>${pct(d.first_total)}</b></div>
    <div class="discount-row total"><span>續期合計</span><b>${pct(d.renew_total)}</b></div>
  `;
}

function renderNotice(r, inp) {
  const scLabel = scenario==='M'?'最可能紅利 (中分紅)':scenario==='L'?'較低紅利':'紅利為零';
  $('notice').innerHTML = `
    <b>${RATES.product_name}</b> · ${inp.age} 歲${inp.sex==='M'?'男':'女'}性 · ${r.prod.code} · ${inp.faceWan} 萬美元 · ${inp.freq} ·
    GP費率 ${r.gp} · 預定利率 ${(r.prod.reserve_rate*100).toFixed(2)}% · 情境:${scLabel}
    ${inp.showTwd ? `· <span style="color:var(--orange-dark)">已換算新台幣 (×${inp.fxRate})</span>` : ''}
  `;
}

function renderTable(r, inp) {
  // Find break-even (first year cumP <= K)
  let breakEvenYr = -1;
  for (const row of r.rows) {
    if (row.cumP > 0 && row.K >= row.cumP) { breakEvenYr = row.yr; break; }
  }

  const html = `
    <table>
      <thead>
        <tr class="h1">
          <th rowspan="2">保單<br>年度</th>
          <th rowspan="2">保險<br>年齡</th>
          <th colspan="2">實繳保費</th>
          <th colspan="2" class="col-detail">保證給付 (基本保額)</th>
          <th colspan="3" class="col-detail">非保證 (年度紅利→增額繳清)</th>
          <th colspan="2" class="col-detail">終期保單紅利</th>
          <th colspan="2">合計 (預估值)</th>
        </tr>
        <tr class="h2">
          <th>當年 A</th><th>累計 B</th>
          <th class="guaranteed col-detail">身故 C</th><th class="guaranteed col-detail">解約 D</th>
          <th class="non-guaranteed col-detail">累計增額 E</th>
          <th class="non-guaranteed col-detail">增額身故 F</th>
          <th class="non-guaranteed col-detail">增額解約 G</th>
          <th class="terminal col-detail">終期身故 H</th>
          <th class="terminal col-detail">終期解約 I</th>
          <th class="total">身故 J</th><th class="total">解約 K</th>
        </tr>
      </thead>
      <tbody>
        ${r.rows.map(row => `
          <tr class="${row.yr === breakEvenYr ? 'break-even' : ''}">
            <td class="text-center">${row.yr}</td>
            <td class="text-center">${row.attainedAge}</td>
            <td class="${row.isPay ? 'pay-yr' : 'zero'}">${row.A ? showAmount(row.A, inp) : '—'}</td>
            <td>${showAmount(row.cumP, inp)}</td>
            <td class="col-detail">${showAmount(row.C, inp)}</td>
            <td class="col-detail">${showAmountDec(row.D, inp)}</td>
            <td class="col-detail ${row.E===0?'zero':''}">${row.E ? showAmount(row.E, inp) : '—'}</td>
            <td class="col-detail ${row.F===0?'zero':''}">${row.F ? showAmount(row.F, inp) : '—'}</td>
            <td class="col-detail ${row.G===0?'zero':''}">${row.G ? showAmountDec(row.G, inp) : '—'}</td>
            <td class="col-detail ${row.H===0?'zero':''}">${row.H ? showAmountDec(row.H, inp) : '—'}</td>
            <td class="col-detail ${row.I===0?'zero':''}">${row.I ? showAmountDec(row.I, inp) : '—'}</td>
            <td class="col-total">${showAmountDec(row.J, inp)}</td>
            <td class="col-total">${showAmountDec(row.K, inp)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  $('table-wrap').innerHTML = html;
}

function renderChart(r, inp) {
  const ctx = $('chart-main');
  const labels = r.rows.map(row => `${row.yr}/${row.attainedAge}歲`);
  const mul = inp.showTwd ? inp.fxRate : 1;
  const dataPaid = r.rows.map(row => row.cumP * mul);
  const dataDeath = r.rows.map(row => row.J * mul);
  const dataSurr = r.rows.map(row => row.K * mul);
  const accent = getComputedStyle(document.body).getPropertyValue('--accent').trim();
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: `累計保費 ${inp.showTwd?'NT$':'USD'}`, data: dataPaid, borderColor: '#F05A28', backgroundColor:'rgba(240,90,40,0.08)', tension:0.2, borderWidth:2.5, pointRadius:0, fill:true },
        { label: `身故總和 J`, data: dataDeath, borderColor: '#0D2A3A', backgroundColor:'rgba(13,42,58,0.05)', tension:0.2, borderWidth:2.5, pointRadius:0 },
        { label: `解約總和 K`, data: dataSurr, borderColor: '#0f766e', backgroundColor:'rgba(15,118,110,0.08)', tension:0.2, borderWidth:2.5, pointRadius:0, fill:true },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { position: 'top', labels:{usePointStyle:true,boxWidth:8,font:{size:11}} },
        tooltip: {
          callbacks: {
            label: (ctx) => ` ${ctx.dataset.label}: ${inp.showTwd?'NT$':'USD '}${Math.round(ctx.parsed.y).toLocaleString()}`,
          }
        }
      },
      scales: {
        x: { ticks:{maxTicksLimit:15,font:{size:10}}, grid:{display:false} },
        y: {
          ticks:{
            font:{size:10},
            callback: (v) => (inp.showTwd?'NT$':'$') + (v/1000).toLocaleString() + 'k'
          },
          grid: { color: '#eee' }
        }
      },
    }
  });
}

function renderPrintFooter(inp) {
  const today = new Date();
  const dateStr = today.getFullYear() + '/' + (today.getMonth()+1) + '/' + today.getDate();
  $('print-footer').innerHTML = `
    試算日期:${dateStr} · 鼎綸保險經紀人 - 恩宇體系 ·
    匯率:${inp.fxRate} (USD→TWD) ·
    本試算僅供參考,非正式建議書,實際金額以保單條款為準。
  `;
}

function setScenario(s) {
  scenario = s;
  document.querySelectorAll('.scenario-tabs button[data-scenario]').forEach(b => {
    b.classList.toggle('active', b.dataset.scenario === s);
  });
  recalc();
}
function setView(v) {
  view = v;
  document.body.setAttribute('data-view', v);
  document.querySelectorAll('.seg-mini button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === v);
  });
}

function exportCSV() {
  if (!RATES) return;
  const rows = document.querySelectorAll('tbody tr');
  if (!rows.length) return;
  const headers = ['保單年度','保險年齡','當年保費A','累計保費B','身故C','解約D','累計增額E','增額身故F','增額解約G','終期身故H','終期解約I','總身故J','總解約K'];
  let csv = headers.join(',') + '\n';
  rows.forEach(tr => {
    const cells = [...tr.children].map(td => td.textContent.replace(/,|USD|NT\$/g,'').replace(/—/g,'0').trim());
    csv += cells.join(',') + '\n';
  });
  const blob = new Blob(['﻿' + csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `美鴻添富試算_${$('plan').value}_${$('face').value}萬美元.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Age-mode toggle UI
document.querySelectorAll('input[name="age-mode"]').forEach(el => {
  el.addEventListener('change', () => {
    const mode = document.querySelector('input[name="age-mode"]:checked').value;
    $('bday-block').style.display = mode === 'bday' ? '' : 'none';
    $('direct-block').style.display = mode === 'direct' ? '' : 'none';
    recalc();
  });
});

['name','bd-y','bd-m','bd-d','direct-age','plan','freq','face','fx-rate','show-twd'].forEach(id =>
  $(id).addEventListener('input', recalc));
document.querySelectorAll('input[name="sex"]').forEach(el =>
  el.addEventListener('change', recalc));

loadRates();
</script>
