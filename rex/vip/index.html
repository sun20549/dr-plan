<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資型專區 ・ 鼎綸恩宇</title>
<meta name="description" content="鼎綸恩宇投資型專區 ・ 70+ 客戶成交案例 ・ 凱基/元大/法巴/安達商品介紹 ・ 安聯收益成長基金分析">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Bebas+Neue&family=Montserrat:wght@600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  /* ═══════════════════════════════════════════
     SPA Loader 樣式
     ═══════════════════════════════════════════ */

  /* 載入動畫 */
  #spa-loader {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0D2A3A 0%, #061827 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.4s ease;
  }
  #spa-loader.hide {
    opacity: 0;
    pointer-events: none;
  }
  .loader-brand {
    color: #fff;
    text-align: center;
    margin-bottom: 32px;
  }
  .loader-mark {
    display: inline-block;
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, #F05A28 0%, #E8A020 100%);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 20px;
    line-height: 56px;
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 16px;
    box-shadow: 0 12px 32px rgba(232,160,32,0.35);
    animation: loader-pulse 1.5s ease-in-out infinite;
  }
  .loader-name {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  .loader-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .loader-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #E8A020;
    border-radius: 50%;
    animation: loader-spin 0.8s linear infinite;
  }
  .loader-text {
    margin-top: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
  }
  @keyframes loader-spin {
    to { transform: rotate(360deg); }
  }
  @keyframes loader-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* SPA 容器 */
  #spa-content {
    min-height: 100vh;
  }

  /* 頁面切換動畫 */
  .spa-page-enter {
    animation: pageEnter 0.4s ease-out;
  }
  @keyframes pageEnter {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 頂部進度條 */
  #spa-progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, #F05A28, #E8A020);
    width: 0;
    z-index: 10000;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px rgba(232,160,32,0.6);
  }

  /* 錯誤提示 */
  .spa-error {
    max-width: 600px;
    margin: 80px auto;
    padding: 40px;
    background: #fff;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  }
  .spa-error h2 {
    font-size: 24px;
    color: #0D2A3A;
    margin-bottom: 12px;
  }
  .spa-error p {
    color: #666;
    margin-bottom: 24px;
    line-height: 1.7;
  }
  .spa-error a {
    display: inline-block;
    padding: 12px 28px;
    background: linear-gradient(135deg, #F05A28, #D04618);
    color: #fff;
    text-decoration: none;
    border-radius: 50px;
    font-weight: 900;
    letter-spacing: 1px;
  }

  /* 浮動回首頁按鈕（SPA 模式） */
  .spa-home-btn {
    position: fixed;
    left: 24px;
    bottom: 24px;
    background: linear-gradient(135deg, #0D2A3A, #061827);
    color: #fff;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 20px;
    z-index: 998;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: all 0.3s;
    border: none;
    cursor: pointer;
  }
  .spa-home-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 24px rgba(0,0,0,0.3);
  }
  .spa-home-btn.show {
    display: flex;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- SPA 載入動畫 -->
<div id="spa-loader">
  <div class="loader-brand">
    <div class="loader-mark">DL</div>
    <div class="loader-name">鼎綸恩宇</div>
    <div class="loader-sub">Investment Hub</div>
  </div>
  <div class="loader-spinner"></div>
  <div class="loader-text">載入中...</div>
</div>

<!-- 頂部進度條 -->
<div id="spa-progress"></div>

<!-- SPA 內容容器 -->
<div id="spa-content"></div>

<!-- 浮動回首頁按鈕（首頁時隱藏） -->
<a href="#/" class="spa-home-btn" id="spaHomeBtn" title="回到首頁">🏠</a>

<script>
/* ═══════════════════════════════════════════════════
   SPA 路由系統
   ═══════════════════════════════════════════════════ */

const ROUTES = {
  // 首頁
  '/': 'home.html',

  // 客戶案例
  '/cases': 'cases/index.html',
  '/cases/u0033': 'cases/u0033.html',
  '/cases/u0042': 'cases/u0042.html',
  '/cases/k3007': 'cases/k3007.html',
  '/cases/u0073': 'cases/u0073.html',
  '/cases/k1083': 'cases/k1083.html',
  '/cases/u0048': 'cases/u0048.html',
  '/cases/u0029': 'cases/u0029.html',
  '/cases/k7565': 'cases/k7565.html',
  '/cases/u0093': 'cases/u0093.html',
  '/cases/c2847': 'cases/c2847.html',
  '/cases/u0017': 'cases/u0017.html',
  '/cases/k2303': 'cases/k2303.html',
  '/cases/f4435': 'cases/f4435.html',
  '/cases/f5027': 'cases/f5027.html',
  '/cases/f1760': 'cases/f1760.html',
  '/cases/f2040': 'cases/f2040.html',
  '/cases/k2810': 'cases/k2810.html',
  '/cases/u0091': 'cases/u0091.html',
  '/cases/f4063': 'cases/f4063.html',

  // 商品專區
  '/products/kgi': 'products/kgi-zhaocai.html',
  '/products/yuanta': 'products/yuanta-fengshou.html',
  '/products/bnp': 'products/bnp-jincai.html',
  '/products/chubb-xinfu': 'products/chubb-xinfu.html',
  '/products/chubb-fugui': 'products/chubb-fugui.html',
  '/products/chubb-meili': 'products/chubb-meili.html',

  // 安聯
  '/allianz': 'allianz/index.html',

  // 財商增益
  '/knowledge/currency': 'knowledge/currency-buffer.html',
  '/knowledge/index': 'knowledge/index-comparison.html',
  '/knowledge/qqq': 'knowledge/qqq.html',

  // 工具資源
  '/resources/dividend': 'resources/dividend-schedule.html',
  '/resources/funds': 'resources/fund-performance.html',
  '/resources/insurance': 'resources/insurance-types.html',
  '/resources/car': 'resources/car-program.html',

  // FAQ
  '/faq': 'faq/index.html',
};

const ROUTE_TITLES = {
  '/': '投資型專區 ・ 鼎綸恩宇',
  '/cases': '客戶成交案例 ・ 投資型專區',
  '/products/kgi': '凱基招財進保 ・ 投資型專區',
  '/products/yuanta': '元大元元豐收 ・ 投資型專區',
  '/products/bnp': '法巴金采年華 ・ 投資型專區',
  '/products/chubb-xinfu': '安達新幸福成雙 ・ 投資型專區',
  '/products/chubb-fugui': '安達富貴大贏家 ・ 投資型專區',
  '/products/chubb-meili': '安達美利紅 ・ 投資型專區',
  '/allianz': '安聯收益成長基金 ・ 投資型專區',
  '/faq': '常見問題 FAQ ・ 投資型專區',
};

const cache = new Map();
const contentEl = document.getElementById('spa-content');
const loaderEl = document.getElementById('spa-loader');
const progressEl = document.getElementById('spa-progress');
const homeBtnEl = document.getElementById('spaHomeBtn');

/* === 進度條 === */
function startProgress() {
  progressEl.style.width = '30%';
  setTimeout(() => progressEl.style.width = '70%', 200);
}
function endProgress() {
  progressEl.style.width = '100%';
  setTimeout(() => progressEl.style.width = '0', 400);
}

/* === 載入頁面 === */
async function loadPage(route) {
  // 處理 hash 路由：#/cases 或 #/cases/u0033
  let path = (route || '').replace(/^#\/?/, '/').replace(/\/$/, '') || '/';
  if (path === '') path = '/';

  // 頁內錨點（例如 #cases、#products）— 不是路由，跳過
  if (route && !route.startsWith('#/') && route.startsWith('#') && route.length > 1) {
    // 嘗試在當前內容中找對應 id 並滾動
    const targetId = route.substring(1);
    const target = document.getElementById(targetId);
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      return;
    }
  }

  // 找對應檔案
  let filepath = ROUTES[path];

  // 動態案例路由：/cases/u0033 → cases/u0033.html
  if (!filepath) {
    const caseMatch = path.match(/^\/cases\/([a-z]\d{4})$/i);
    if (caseMatch) {
      filepath = `cases/${caseMatch[1].toLowerCase()}.html`;
    }
  }

  // 如果還是找不到，預設首頁
  if (!filepath) {
    filepath = ROUTES['/'];
    path = '/';
  }

  startProgress();

  try {
    let html;
    if (cache.has(filepath)) {
      html = cache.get(filepath);
    } else {
      const res = await fetch(filepath);
      if (!res.ok) throw new Error('Page not found: ' + filepath);
      html = await res.text();
      cache.set(filepath, html);
    }

    // 從完整 HTML 中只取 <body> 內容
    const bodyContent = extractBody(html);

    // 處理內部連結，全部改成 SPA 路由
    const processedContent = rewriteLinks(bodyContent);

    // 注入內容
    contentEl.innerHTML = processedContent;
    contentEl.classList.remove('spa-page-enter');
    void contentEl.offsetWidth;  // 重啟動畫
    contentEl.classList.add('spa-page-enter');

    // 重新執行 <script> 標籤（fetch 載入的 script 不會自動執行）
    executeScripts(contentEl);

    // 設定頁面標題
    document.title = ROUTE_TITLES[path] || '投資型專區';

    // 滾到頂部
    window.scrollTo({ top: 0, behavior: 'instant' });

    // 顯示/隱藏首頁按鈕
    if (path === '/') {
      homeBtnEl.classList.remove('show');
    } else {
      homeBtnEl.classList.add('show');
    }

    endProgress();

    // 第一次載入後隱藏 loader
    loaderEl.classList.add('hide');
    setTimeout(() => loaderEl.style.display = 'none', 400);

  } catch (err) {
    console.error('SPA load error:', err);
    contentEl.innerHTML = `
      <div class="spa-error">
        <h2>頁面載入失敗</h2>
        <p>無法載入此頁面（${filepath}）。<br>
        如果您是直接雙擊本地檔案開啟，<br>瀏覽器安全限制無法載入分檔，<br>
        請使用本機伺服器或部署到網站後檢視。</p>
        <a href="#/">回到首頁</a>
      </div>
    `;
    endProgress();
    loaderEl.classList.add('hide');
    setTimeout(() => loaderEl.style.display = 'none', 400);
  }
}

/* === 從完整 HTML 中提取 body 與 head 中的 style === */
function extractBody(html) {
  // 取出 head 中的 <style> 標籤（保留頁面專屬樣式）
  const headMatch = html.match(/<head[^>]*>([\s\S]*?)<\/head>/i);
  let styles = '';
  if (headMatch) {
    const styleMatches = headMatch[1].match(/<style[^>]*>[\s\S]*?<\/style>/g) || [];
    styles = styleMatches.join('\n');
  }

  // 取出 body 內容
  const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
  const body = bodyMatch ? bodyMatch[1] : html;

  return styles + '\n' + body;
}

/* === 改寫內部連結為 SPA 路由 === */
function rewriteLinks(html) {
  // 建立 link 對應表（filepath -> route）
  const linkMap = {};
  Object.entries(ROUTES).forEach(([route, filepath]) => {
    linkMap[filepath] = '#' + route;
  });

  // 處理各種 href 形式
  Object.entries(linkMap).forEach(([filepath, route]) => {
    const escFilepath = escapeRegex(filepath);
    [
      new RegExp(`href="${escFilepath}"`, 'g'),
      new RegExp(`href="\\.\\./${escFilepath}"`, 'g'),
      new RegExp(`href="\\./${escFilepath}"`, 'g'),
    ].forEach(p => {
      html = html.replace(p, `href="${route}"`);
    });
  });

  // 回首頁的各種寫法
  html = html.replace(/href="\.\.\/index\.html"/g, 'href="#/"');
  html = html.replace(/href="\.\/index\.html"/g, 'href="#/"');
  html = html.replace(/href="index\.html"/g, 'href="#/"');

  // 含 # 錨點的（首頁區段）
  html = html.replace(/href="\.\.\/index\.html#products"/g, 'href="#/"');
  html = html.replace(/href="\.\.\/index\.html#cases"/g, 'href="#/cases"');
  html = html.replace(/href="\.\.\/index\.html#knowledge"/g, 'href="#/"');
  html = html.replace(/href="\.\.\/index\.html#allianz"/g, 'href="#/allianz"');
  html = html.replace(/href="\.\.\/index\.html#resources"/g, 'href="#/"');
  html = html.replace(/href="\.\.\/index\.html#faq"/g, 'href="#/faq"');

  // 案例頁同目錄相對連結（u0042.html → #/cases/u0042）
  html = html.replace(/href="(u\d{4}|k\d{4}|f\d{4}|c\d{4})\.html"/gi, (m, id) => {
    return `href="#/cases/${id.toLowerCase()}"`;
  });

  // 首頁卡片連結到案例（cases/u0042.html → #/cases/u0042）
  html = html.replace(/href="cases\/([a-z]\d{4})\.html"/gi, (m, id) => {
    return `href="#/cases/${id.toLowerCase()}"`;
  });

  // CSS / 資源路徑修正
  html = html.replace(/href="\.\.\/shared\.css"/g, 'href="shared.css"');
  html = html.replace(/href="\.\/shared\.css"/g, 'href="shared.css"');

  return html;
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/* === 重新執行注入內容中的 <script> === */
function executeScripts(container) {
  const scripts = container.querySelectorAll('script');
  scripts.forEach(oldScript => {
    const newScript = document.createElement('script');
    Array.from(oldScript.attributes).forEach(attr => {
      newScript.setAttribute(attr.name, attr.value);
    });
    newScript.textContent = oldScript.textContent;
    oldScript.parentNode.replaceChild(newScript, oldScript);
  });
}

/* === 路由監聽 === */
window.addEventListener('hashchange', () => loadPage(location.hash));
window.addEventListener('DOMContentLoaded', () => loadPage(location.hash || '#/'));
</script>

</body>
</html>
