<script>
/* ═══════════════════════════════════════════════════

const ROUTES = {

  // 財商增益
  '/knowledge/currency': 'knowledge/currency-buffer.html',
  '/knowledge/index': 'knowledge/index-comparison.html',
  '/knowledge/qqq': 'knowledge/qqq.html',

  // 工具資源
  '/resources/dividend': 'resources/dividend-schedule.html',
  '/resources/funds': 'resources/fund-performance.html',
  '/resources/insurance': 'resources/insurance-types.html',
  '/resources/car': 'resources/car-program.html',

  // FAQ
  '/faq': 'faq/index.html',
};

const ROUTE_TITLES = {
  '/': '投資型專區 ・ 鼎綸恩宇',
  '/cases': '客戶成交案例 ・ 投資型專區',
  '/products/kgi': '凱基招財進保 ・ 投資型專區',
  '/products/yuanta': '元大元元豐收 ・ 投資型專區',
  '/products/bnp': '法巴金采年華 ・ 投資型專區',
  '/products/chubb-xinfu': '安達新幸福成雙 ・ 投資型專區',
  '/products/chubb-fugui': '安達富貴大贏家 ・ 投資型專區',
  '/products/chubb-meili': '安達美利紅 ・ 投資型專區',
  '/allianz': '安聯收益成長基金 ・ 投資型專區',
  '/faq': '常見問題 FAQ ・ 投資型專區',
};

const cache = new Map();
const contentEl = document.getElementById('spa-content');
const loaderEl = document.getElementById('spa-loader');
const progressEl = document.getElementById('spa-progress');
const homeBtnEl = document.getElementById('spaHomeBtn');

/* === 進度條 === */
function startProgress() {
  progressEl.style.width = '30%';
  setTimeout(() => progressEl.style.width = '70%', 200);
}
function endProgress() {
  progressEl.style.width = '100%';
  setTimeout(() => progressEl.style.width = '0', 400);
}

/* === 載入頁面 === */
async function loadPage(route) {
  // 處理 hash 路由：#/cases 或 #/cases/u0033
  let path = (route || '').replace(/^#\/?/, '/').replace(/\/$/, '') || '/';
  if (path === '') path = '/';

  // 頁內錨點（例如 #cases、#products）— 不是路由，跳過
  if (route && !route.startsWith('#/') && route.startsWith('#') && route.length > 1) {
    // 嘗試在當前內容中找對應 id 並滾動
    const targetId = route.substring(1);
    const target = document.getElementById(targetId);
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      return;
    }
  }

  // 找對應檔案
  let filepath = ROUTES[path];

  // 動態案例路由：/cases/u0033 → cases/u0033.html
  if (!filepath) {
    const caseMatch = path.match(/^\/cases\/([a-z]\d{4})$/i);
    if (caseMatch) {
      filepath = `cases/${caseMatch[1].toLowerCase()}.html`;
    }
  }

  // 如果還是找不到，預設首頁
  if (!filepath) {
    filepath = ROUTES['/'];
    path = '/';
  }

  startProgress();

  try {
    let html;
    if (cache.has(filepath)) {
      html = cache.get(filepath);
    } else {
      const res = await fetch(filepath);
      if (!res.ok) throw new Error('Page not found: ' + filepath);
      html = await res.text();
      cache.set(filepath, html);
    }

    // 從完整 HTML 中只取 <body> 內容
    const bodyContent = extractBody(html);

    // 處理內部連結，全部改成 SPA 路由
    const processedContent = rewriteLinks(bodyContent);

    // 注入內容
    contentEl.innerHTML = processedContent;
    contentEl.classList.remove('spa-page-enter');
    void contentEl.offsetWidth;  // 重啟動畫
    contentEl.classList.add('spa-page-enter');

    // 重新執行 <script> 標籤（fetch 載入的 script 不會自動執行）
    executeScripts(contentEl);

    // 套用 scroll reveal / count-up 動畫到新內容
    applyEnhancements(contentEl);

    // 設定頁面標題
    document.title = ROUTE_TITLES[path] || '投資型專區';

    // 滾到頂部
    window.scrollTo({ top: 0, behavior: 'instant' });

    // 顯示/隱藏首頁按鈕
    if (path === '/') {
      homeBtnEl.classList.remove('show');
    } else {
      homeBtnEl.classList.add('show');
    }

    endProgress();

    // 第一次載入後隱藏 loader
    loaderEl.classList.add('hide');
    setTimeout(() => loaderEl.style.display = 'none', 400);

  } catch (err) {
    console.error('SPA load error:', err);
    contentEl.innerHTML = `
      <div class="spa-error">
        <h2>頁面載入失敗</h2>
        <p>無法載入此頁面（${filepath}）。<br>
        如果您是直接雙擊本地檔案開啟，<br>瀏覽器安全限制無法載入分檔，<br>
        請使用本機伺服器或部署到網站後檢視。</p>
        <a href="#/">回到首頁</a>
      </div>
    `;
    endProgress();
    loaderEl.classList.add('hide');
    setTimeout(() => loaderEl.style.display = 'none', 400);
  }
}

/* === 從完整 HTML 中提取 body 與 head 中的 style === */
function extractBody(html) {
  // 取出 head 中的 <style> 標籤（保留頁面專屬樣式）
  const headMatch = html.match(/<head[^>]*>([\s\S]*?)<\/head>/i);
  let styles = '';
  if (headMatch) {
    const styleMatches = headMatch[1].match(/<style[^>]*>[\s\S]*?<\/style>/g) || [];
    styles = styleMatches.join('\n');
  }

  // 取出 body 內容
  const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
  const body = bodyMatch ? bodyMatch[1] : html;

  return styles + '\n' + body;
}

/* === 改寫內部連結為 SPA 路由 === */
function rewriteLinks(html) {
  // 建立 link 對應表（filepath -> route）
  const linkMap = {};
  Object.entries(ROUTES).forEach(([route, filepath]) => {
    linkMap[filepath] = '#' + route;
  });

  // 處理各種 href 形式
  Object.entries(linkMap).forEach(([filepath, route]) => {
    const escFilepath = escapeRegex(filepath);
    [
      new RegExp(`href="${escFilepath}"`, 'g'),
      new RegExp(`href="\\.\\./${escFilepath}"`, 'g'),
      new RegExp(`href="\\./${escFilepath}"`, 'g'),
    ].forEach(p => {
      html = html.replace(p, `href="${route}"`);
    });
  });

  // 回首頁的各種寫法
  html = html.replace(/href="\.\.\/index\.html"/g, 'href="#/"');
  html = html.replace(/href="\.\/index\.html"/g, 'href="#/"');
  html = html.replace(/href="index\.html"/g, 'href="#/"');

  // 含 # 錨點的（首頁區段）
  html = html.replace(/href="\.\.\/index\.html#products"/g, 'href="#/"');
  html = html.replace(/href="\.\.\/index\.html#cases"/g, 'href="#/cases"');
  html = html.replace(/href="\.\.\/index\.html#knowledge"/g, 'href="#/"');
  html = html.replace(/href="\.\.\/index\.html#allianz"/g, 'href="#/allianz"');
  html = html.replace(/href="\.\.\/index\.html#resources"/g, 'href="#/"');
  html = html.replace(/href="\.\.\/index\.html#faq"/g, 'href="#/faq"');

  // 案例頁同目錄相對連結（u0042.html → #/cases/u0042）
  html = html.replace(/href="(u\d{4}|k\d{4}|f\d{4}|c\d{4})\.html"/gi, (m, id) => {
    return `href="#/cases/${id.toLowerCase()}"`;
  });

  // 首頁卡片連結到案例（cases/u0042.html → #/cases/u0042）
  html = html.replace(/href="cases\/([a-z]\d{4})\.html"/gi, (m, id) => {
    return `href="#/cases/${id.toLowerCase()}"`;
  });

  // CSS / 資源路徑修正
  html = html.replace(/href="\.\.\/shared\.css"/g, 'href="shared.css"');
  html = html.replace(/href="\.\/shared\.css"/g, 'href="shared.css"');

  return html;
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/* === 重新執行注入內容中的 <script> === */
function executeScripts(container) {
  const scripts = container.querySelectorAll('script');
  scripts.forEach(oldScript => {
    const newScript = document.createElement('script');
    Array.from(oldScript.attributes).forEach(attr => {
      newScript.setAttribute(attr.name, attr.value);
    });
    newScript.textContent = oldScript.textContent;
    oldScript.parentNode.replaceChild(newScript, oldScript);
  });
}

/* === 路由監聽 === */
window.addEventListener('hashchange', () => loadPage(location.hash));
window.addEventListener('DOMContentLoaded', () => loadPage(location.hash || '#/'));

/* ═══════════════════════════════════════════════════
   V3 互動增強：scroll reveal + count-up + 主題切換
   ═══════════════════════════════════════════════════ */

/* ─── 滾動進場觀察器 ─── */
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('is-visible');
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

/* ─── 數字計數動畫 ─── */
function animateCountUp(el) {
  const targetRaw = el.dataset.countup;
  if (!targetRaw) return;
  const target = parseFloat(targetRaw);
  const decimals = (targetRaw.split('.')[1] || '').length;
  const duration = parseInt(el.dataset.countupDuration || '1600', 10);
  const prefix = el.dataset.countupPrefix || '';
  const suffix = el.dataset.countupSuffix || '';
  const startTime = performance.now();
  const easeOut = (t) => 1 - Math.pow(1 - t, 3);
  function tick(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = easeOut(progress);
    const value = (target * eased).toFixed(decimals);
    el.textContent = prefix + Number(value).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }) + suffix;
    if (progress < 1) requestAnimationFrame(tick);
    else el.textContent = prefix + Number(target).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }) + suffix;
  }
  el.textContent = prefix + '0' + (decimals ? '.' + '0'.repeat(decimals) : '') + suffix;
  requestAnimationFrame(tick);
}
const countupObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      animateCountUp(entry.target);
      countupObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.4 });

/* ─── 套用到任意容器（被 SPA loadPage 呼叫） ─── */
function applyEnhancements(root) {
  if (!root) return;
  // scroll reveal
  root.querySelectorAll('[data-reveal]').forEach(el => {
    revealObserver.observe(el);
  });
  // count-up
  root.querySelectorAll('[data-countup]').forEach(el => {
    countupObserver.observe(el);
  });
  // tab 切換動畫加強 (products 頁)
  root.querySelectorAll('.tab-bar button').forEach(btn => {
    if (btn.__enhanced) return;
    btn.__enhanced = true;
    btn.addEventListener('click', () => {
      const target = btn.dataset.tab;
      if (!target) return;
      const tabBar = btn.closest('.tab-bar');
      const content = tabBar ? tabBar.nextElementSibling : null;
      if (content) {
        content.querySelectorAll('.tab-pane').forEach(p => {
          if (p.id === target) {
            p.classList.remove('fade-leave');
          }
        });
      }
    });
  });
  // 表格小螢幕橫滾包裝（只有大表格才包）
  root.querySelectorAll('.data-table').forEach(table => {
    if (table.dataset.wrapDone) return;
    const cols = table.querySelectorAll('thead th').length;
    if (cols >= 4 && !table.parentElement.classList.contains('table-scroll-mobile')) {
      const wrap = document.createElement('div');
      wrap.className = 'table-scroll-mobile';
      table.parentNode.insertBefore(wrap, table);
      wrap.appendChild(table);
    }
    table.dataset.wrapDone = '1';
  });
  // FAQ 互斥開合（已在 home.html 有，這邊補對其他頁也有 .faq-item 的情況）
  const faqs = root.querySelectorAll('.faq-item');
  if (faqs.length > 0) {
    faqs.forEach(faq => {
      if (faq.__faqEnhanced) return;
      faq.__faqEnhanced = true;
      faq.addEventListener('toggle', function() {
        if (this.open) {
          faqs.forEach(other => { if (other !== this) other.removeAttribute('open'); });
        }
      });
    });
  }
  // 案例截圖自動探測（每個 .case-screenshots-section[data-case-id]）
  root.querySelectorAll('.case-screenshots-section[data-case-id]').forEach(el => {
    if (el.__ssEnhanced) return;
    el.__ssEnhanced = true;
    if (typeof detectCaseScreenshots === 'function') {
      detectCaseScreenshots(el.dataset.caseId, el);
    }
  });
}

/* ─── 案例對帳單偵測（manifest 優先 / probe 備援） ─── */
const SCREENSHOT_EXTS = ['jpg', 'png'];
const SCREENSHOT_MAX = 6;
const LOOKBACK_MONTHS = 24;

let _manifestCache = null;
async function fetchManifest() {
  if (_manifestCache !== null) return _manifestCache;
  try {
    // 加時間戳避開瀏覽器/CDN cache
    const url = 'assets/img/cases/manifest.json?t=' + Date.now();
    const res = await fetch(url, { cache: 'no-cache' });
    if (!res.ok) { _manifestCache = {}; return {}; }
    _manifestCache = await res.json();
    return _manifestCache;
  } catch (e) {
    _manifestCache = {};
    return {};
  }
}

async function probeImage(url) {
  try {
    const res = await fetch(url, { method: 'HEAD', cache: 'force-cache' });
    return res.ok;
  } catch (e) {
    return false;
  }
}

// 並發控制：一次最多 12 個 in-flight 請求（避免被瀏覽器/CDN 擋）
async function parallelLimit(items, fn, limit = 12) {
  const results = new Array(items.length);
  let idx = 0;
  const workers = Array(Math.min(limit, items.length)).fill(0).map(async () => {
    while (idx < items.length) {
      const i = idx++;
      results[i] = await fn(items[i], i);
    }
  });
  await Promise.all(workers);
  return results;
}

async function detectCaseScreenshots(caseId, container) {
  if (!caseId || !container) return;
  const baseId = caseId.toLowerCase();
  const baseUrl = 'assets/img/cases/' + baseId;

  // 1. 先讀 manifest.json — 秒查所有檔案
  const manifest = await fetchManifest();
  const manifestFiles = manifest[baseId] || [];

  // 2. 若 manifest 沒記錄此案，備援 probe 舊格式（無日期 caseId-N.jpg）
  let files = [];
  if (manifestFiles.length > 0) {
    files = manifestFiles.map(name => `${baseUrl.replace(baseId, '')}${name}`);
  } else {
    // Legacy probe 備援
    for (let i = 1; i <= SCREENSHOT_MAX; i++) {
      let hit = null;
      for (const ext of SCREENSHOT_EXTS) {
        if (await probeImage(`${baseUrl}-${i}.${ext}`)) { hit = `${baseUrl}-${i}.${ext}`; break; }
      }
      if (!hit) break;
      files.push(hit);
    }
  }

  // 3. 從檔名解析（YYYYMMDD 或 YYYYMM 或無日期）
  // 範例 c0235-20250513-1.jpg → { ymd: '20250513', idx: 1 }
  //      c0235-202505-1.jpg → { ymd: '20250500' }（補 '00' 為日，仍可月分組）
  //      c0235-1.jpg → { ymd: null }
  const parsedFiles = files.map(url => {
    const fname = url.split('/').pop();
    let m;
    if ((m = fname.match(/^[a-z]\d{4}-(\d{8})-(\d+)\./i))) {
      return { url, ymd: m[1], idx: parseInt(m[2], 10) };
    }
    if ((m = fname.match(/^[a-z]\d{4}-(\d{6})-(\d+)\./i))) {
      return { url, ymd: m[1] + '00', idx: parseInt(m[2], 10) };
    }
    if ((m = fname.match(/^[a-z]\d{4}-(\d+)\./i))) {
      return { url, ymd: null, idx: parseInt(m[1], 10) };
    }
    return { url, ymd: null, idx: 999 };
  });

  // 4. 依年月分組（YYYYMM）顯示
  const groupMap = new Map();
  for (const f of parsedFiles) {
    const key = f.ymd ? f.ymd.slice(0, 6) : 'legacy';
    if (!groupMap.has(key)) groupMap.set(key, []);
    groupMap.get(key).push(f);
  }

  const groups = [];
  for (const [key, list] of groupMap) {
    // 依日期 + 序號排序
    list.sort((a, b) => {
      const da = (a.ymd || '00000000') + String(a.idx).padStart(3, '0');
      const db = (b.ymd || '00000000') + String(b.idx).padStart(3, '0');
      return da.localeCompare(db);
    });
    let label = null;
    if (key !== 'legacy') {
      label = `${key.slice(0, 4)} / ${key.slice(4)}`;
    }
    groups.push({
      key: key === 'legacy' ? '0000' : key,
      label,
      files: list.map(f => f.url),
      items: list,  // 含 ymd / idx 細節
    });
  }

  if (groups.length === 0) {
    container.hidden = true;
    return;
  }

  // 月份分組已從新到舊排序（探測順序就是新→舊）
  // legacy 沒日期，預設在最底（key=0000）
  // 重新排序：最新月份 → 最舊月份 → 無日期
  groups.sort((a, b) => b.key.localeCompare(a.key));

  container.hidden = false;
  const grid = container.querySelector('.screenshots-grid');
  if (!grid) return;

  // 攤平所有檔案供 lightbox 翻頁
  const allFiles = groups.flatMap(g => g.files);
  let globalIdx = 0;

  grid.innerHTML = groups.map((g, gIdx) => {
    const isLatest = gIdx === 0 && g.label;
    const header = g.label
      ? `<div class="screenshot-month-header">
           <span class="month-icon">📅</span>
           <span class="month-label">${g.label}</span>
           ${isLatest ? '<span class="month-badge">最新</span>' : ''}
           <span class="month-count">${g.files.length} 張</span>
         </div>`
      : '';
    const cards = g.items.map((item, fIdx) => {
      const idx = globalIdx++;
      // 用該圖的精確日期（YYYY/MM/DD）或月份
      let dateText = '無日期';
      if (item.ymd) {
        const y = item.ymd.slice(0, 4);
        const mo = item.ymd.slice(4, 6);
        const d = item.ymd.slice(6, 8);
        dateText = (d === '00') ? `${y}/${mo}` : `${y}/${mo}/${d}`;
      }
      return `<div class="screenshot-card" data-lb-index="${idx}">
        <div class="ss-header">
          <span class="ss-tag">${fIdx + 1} / ${g.items.length}</span>
          <span class="ss-date">${dateText}</span>
        </div>
        <img src="${item.url}" loading="lazy" alt="案例 ${caseId} 對帳單">
      </div>`;
    }).join('');
    return `<div class="screenshot-month-group">${header}<div class="screenshot-month-grid">${cards}</div></div>`;
  }).join('');

  grid.querySelectorAll('.screenshot-card').forEach(card => {
    card.addEventListener('click', () => openLightbox(allFiles, parseInt(card.dataset.lbIndex, 10)));
  });
}

/* Lightbox */
const lbEl = document.getElementById('case-lightbox');
const lbImg = document.getElementById('lb-image');
const lbCounter = document.getElementById('lb-counter');
let lbImages = [];
let lbIdx = 0;
function openLightbox(images, idx) {
  lbImages = images;
  lbIdx = idx;
  updateLightbox();
  lbEl.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lbEl.classList.remove('show');
  document.body.style.overflow = '';
}
function updateLightbox() {
  if (lbImages.length === 0) return;
  lbImg.src = lbImages[lbIdx];
  lbCounter.textContent = `${lbIdx + 1} / ${lbImages.length}`;
}
function nextLb() { lbIdx = (lbIdx + 1) % lbImages.length; updateLightbox(); }
function prevLb() { lbIdx = (lbIdx - 1 + lbImages.length) % lbImages.length; updateLightbox(); }
lbEl.querySelector('.lb-close').addEventListener('click', e => { e.stopPropagation(); closeLightbox(); });
lbEl.querySelector('.lb-next').addEventListener('click', e => { e.stopPropagation(); nextLb(); });
lbEl.querySelector('.lb-prev').addEventListener('click', e => { e.stopPropagation(); prevLb(); });
lbEl.addEventListener('click', e => { if (e.target === lbEl) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!lbEl.classList.contains('show')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') nextLb();
  if (e.key === 'ArrowLeft') prevLb();
});

/* ─── 主題切換（localStorage 持久化） ─── */
(function() {
  const btn = document.getElementById('themeToggle');
  if (!btn) return;
  const saved = localStorage.getItem('vip-theme');
  if (saved === 'dark') {
    document.body.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
  }
  btn.addEventListener('click', () => {
    const cur = document.body.getAttribute('data-theme');
    if (cur === 'dark') {
      document.body.removeAttribute('data-theme');
      localStorage.setItem('vip-theme', 'light');
      btn.textContent = '🌙';
    } else {
      document.body.setAttribute('data-theme', 'dark');
      localStorage.setItem('vip-theme', 'dark');
      btn.textContent = '☀️';
    }
  });
})();
</script>
