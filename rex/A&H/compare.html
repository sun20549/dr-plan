    // 取所有選中商品
    const cols = selectedCodes.map(code => {
      const sel = state.selected[code];
      const product = findProduct(sel.cid, code);
      const company = state.db.companies[sel.cid];
      return { code, sel, product, company };
    });

    // 算 row defs (給付明細)
    const template = ROW_TEMPLATES[state.categoryKey];
    let rowDefs;
    if (template) {
      rowDefs = template
        .map(t => ({
          rowTitle: t.rowTitle,
          evaluator: (col) => evalProductForRow(col.product, col.sel.amount, col.code, t)
        }))
        .filter(rd => cols.some(col => rd.evaluator(col).kind !== 'none'));
    } else {
      const clsOrder = CLS_ORDER_BY_CATEGORY[state.categoryKey] || ['daily','icu_daily','reimburse','surgery','opsurg','critical','death','disability','other'];
      const presentCls = new Set();
      cols.forEach(col => {
        getItems(col.product).forEach(it => {
          presentCls.add(window.AHShared.classifyItem(it).key);
        });
      });
      const rowKeys = clsOrder.filter(k => presentCls.has(k));
      presentCls.forEach(k => { if (!rowKeys.includes(k)) rowKeys.push(k); });
      rowDefs = rowKeys.map(k => ({
        rowTitle: CLS_TITLE[k] || k,
        evaluator: (col) => evalProductCls(col.product, col.sel.amount, k)
      }));
    }

    /* ─── v1.16 / v1.17:實支實付型尾巴附加「條款手術範圍認定」三列 ─────
     * 業務員實際比較重點:該商品條款對「手術」的認定範圍引用了哪幾節 + 限制寫在哪一層。
     * 三列顯示:
     *   1. 手術範圍限制(v1.17 新)— 整條款限制(嚴) / 僅門診手術 / 依條款
     *   2. 健保 2-2-7 西醫手術 — ✓ / ✗ / 依條款
     *   3. 健保 3-3-4-3 牙醫口腔顎面外科 — ✓ / ✗ / 依條款
     * 整條款限制 = 連住院手術都受 2-2-7 / 3-3-4-3 限制;
     * 僅門診手術 = 只有「門診手術費用保險金」這個給付項目受限,住院手術依正常醫療判斷。
     * ─────────────────────────────────────────────────────── */
    if (state.categoryKey === '實支實付型') {
      // v1.17:條款限制層級
      const restrictionEvaluator = (col) => {
        const info = SURGERY_CLAUSE_SCOPE[col.code];
        if (!info || !info.restriction) {
          return { kind: 'rule', tooltip: '尚未從條款確認此商品的手術範圍限制層級' };
        }
        // v1.17:用新 kind 'badge' 顯示色塊
        if (info.restriction === 'whole') {
          return {
            kind: 'badge',
            val: 'whole',
            label: '整條款限制',
            tooltip: '整體手術定義就限制 2-2-7 / 3-3-4-3 — 連住院手術都受限,範圍最嚴。' + (info.source ? '\n條款依據:' + info.source : '')
          };
        } else if (info.restriction === 'outpt') {
          return {
            kind: 'badge',
            val: 'outpt',
            label: '僅門診手術',
            tooltip: '只有「門診手術費用保險金」單獨限制,住院手術依正常醫療判斷,範圍較寬。' + (info.source ? '\n條款依據:' + info.source : '')
          };
        }
        return { kind: 'rule', tooltip: '未確認' };
      };
      // 2-2-7 / 3-3-4-3 各節引用判定
      const makeScopeEvaluator = (flagKey) => (col) => {
        const info = SURGERY_CLAUSE_SCOPE[col.code];
        if (!info || info[flagKey] === null || info[flagKey] === undefined) {
          return { kind: 'rule', tooltip: '尚未從條款確認此商品是否引用該節' };
        }
        return {
          kind: 'bool',
          val: info[flagKey],
          tooltip: info.source || ''
        };
      };

      rowDefs.push({
        rowTitle: '手術範圍限制',
        rowSub: '整條款限制(嚴)/ 僅門診手術(寬)',
        isClauseScope: true,
        evaluator: restrictionEvaluator
      });
      rowDefs.push({
        rowTitle: '健保 2-2-7 西醫手術',
        rowSub: '第二部西醫 ‧ 第二章特定診療 ‧ 第七節 手術',
        isClauseScope: true,
        evaluator: makeScopeEvaluator('has227')
      });
      rowDefs.push({
        rowTitle: '健保 3-3-4-3 牙醫口腔顎面外科',
        rowSub: '第三部牙醫 ‧ 第三章牙科處置及手術 ‧ 第四節口腔顎面外科 ‧ 第三項 開刀房手術',
        isClauseScope: true,
        evaluator: makeScopeEvaluator('has3343')
      });
    }

    // 客戶條件
    const ageRaw = parseInt(document.getElementById('clientAge').value, 10);
    const age = Number.isFinite(ageRaw) && ageRaw >= 0 ? ageRaw : 35;
    const gender = state.client.gender;

    // 每家公司計算保費 + CP
    // 比較截止年齡 = 三家最低續保上限(若都 80,則 80)
    const endAge = getCompareEndAge(cols);
    const cpData = cols.map(col => {
      // 三種保費
      const feeCurrent = lookupPremium(col.product, col.sel.amount, age, gender);
      const fromClient = calcCumulativePremium(col.product, col.sel.amount, age, endAge, gender);
      const fromZero = calcCumulativePremium(col.product, col.sel.amount, 0, endAge, gender);
      // 兩個給付指標(只看給付,跟保費分開)
      const primary = getPrimaryValue(col.product, col.sel.amount, state.categoryKey);
      const daily = getDailyValue(col.product, col.sel.amount);
      // CP 用「從客戶年齡 → 上限」的平均年保費(這是業務員實際情境)
      const avgPremium = fromClient.avg;
      return {
        feeCurrent, fromClient, fromZero, primary, daily,
        avgPremium,
        cpPrimary: (avgPremium > 0 && primary.val > 0) ? primary.val / avgPremium : 0,
        cpDaily:   (avgPremium > 0 && daily > 0) ? daily / avgPremium : 0
      };
    });
    const maxCpP = Math.max(...cpData.map(d => d.cpPrimary), 0);
    const maxCpD = Math.max(...cpData.map(d => d.cpDaily), 0);

    // v1.14b — 依「主打 CP」由高到低排序(各 tab 自動用該 tab 的主打 CP:
    //   實支實付/自負額 → 住院雜費限額 CP、手術險 → 住院手術 CP、
    //   定額日額 → 住院日額 CP、4 個重大傷病/癌症 → 一次金 CP)
    // cpPrimary = 0(無法計算/無對應給付項)一律推到最右邊
    // tiebreaker:同 cpPrimary 用 cpDaily 降序
    {
      const order = cols.map((_, i) => i).sort((a, b) => {
        const A = cpData[a], B = cpData[b];
        // 0/負 推到最後
        const aZero = !(A.cpPrimary > 0);
        const bZero = !(B.cpPrimary > 0);
        if (aZero !== bZero) return aZero ? 1 : -1;
        // 主打 CP 降序
        if (B.cpPrimary !== A.cpPrimary) return B.cpPrimary - A.cpPrimary;
        // tiebreaker:日額 CP 降序
        return B.cpDaily - A.cpDaily;
      });
      const colsSorted = order.map(i => cols[i]);
      const cpDataSorted = order.map(i => cpData[i]);
      cols.length = 0; cols.push(...colsSorted);
      cpData.length = 0; cpData.push(...cpDataSorted);
    }

    // v1.23 — 亮點 badge:該類別內計算「最便宜 / CP最高 / 續保最高」
    const _stats = cols.map((c, i) => ({
      i,
      fee: (cpData[i] && cpData[i].feeCurrent) || 0,
      cp: (cpData[i] && cpData[i].cpPrimary) || 0,
      maxAge: (c.product && c.product.maxAgeContinuous) || 0
    }));
    const _validFees = _stats.filter(s => s.fee > 0);
    const _cheapestIdx = _validFees.length > 0
      ? _validFees.reduce((m, s) => s.fee < m.fee ? s : m).i : -1;
    const _bestCpIdx = _stats.reduce((m, s) => s.cp > m.cp ? s : m, {cp:0,i:-1}).i;
    const _maxAgeVal = Math.max(..._stats.map(s => s.maxAge), 0);
    const _longestAgeIdx = _maxAgeVal > 0
      ? _stats.findIndex(s => s.maxAge === _maxAgeVal) : -1;
    const highlightBadges = cols.map((_c, i) => {
      const arr = [];
      if (i === _cheapestIdx) arr.push('<span class="hl-badge hl-cheap" title="本類別當年保費最低">最便宜</span>');
      if (i === _bestCpIdx && _stats[i].cp > 0) arr.push('<span class="hl-badge hl-bestcp" title="本類別 CP 值最高">CP 最高</span>');
      if (i === _longestAgeIdx && _stats[i].maxAge > 0) arr.push(`<span class="hl-badge hl-longage" title="本類別續保至最高(${_stats[i].maxAge} 歲)">續保 ${_stats[i].maxAge}</span>`);
      return arr.join('');
    });

    // 比較範圍註記
    const compareRangeNote = `比較範圍: ${age}–${endAge} 歲, 共 ${endAge - age + 1} 年`;

    // ─── 渲染整張表 ───
    // v1.1:把費率明細合併進這張表 — 上半每家 1 欄(colspan=2 跨到下半的男/女),
    //       下半每家 2 欄(男/女)。年齡軸從給付列一路延伸到 80 歲費率,在同一張表內。
    const table = document.getElementById('compareTable');
    const showFee = state.ui.fullAgeExpanded;  // 控制下半費率區的顯示

    let html = '<thead><tr><th>給付項目</th>';
    cols.forEach((col, _colIdx) => {
      const colorVar = `--c-${col.sel.cid}`;
      const company = col.company || {};
      const p = col.product || {};
      let amtField;
      if (p.amountMode === 'plan') {
        const planOpts = getAmountOptions(p);
        const opts = planOpts.map(plan => `<option ${plan===String(col.sel.amount)?'selected':''}>${plan}</option>`).join('') || `<option>${col.sel.amount}</option>`;
        amtField = `<select data-code="${col.code}">${opts}</select>`;
      } else {
        amtField = `<input type="number" min="1" data-code="${col.code}" value="${col.sel.amount}">`;
      }
      const unit = p.amountUnit || '';
      // v1.13:若選擇值字串已內含 unit 字(如「2單位」「計劃一」),外面就不再重複顯示 unit
      const showUnitOutside = unit && !String(col.sel.amount).includes(unit);
      const linkTpl = company.linkTemplate || {};
      const linkUrls = (k) => (linkTpl[k] || '').replace('{code}', p.code).replace('{name}', encodeURIComponent(p.name||''));

      // v1.10 — 新商品 badge:v1.9 新增的 4 個商品
      const NEW_CODES = ['HSY', 'WV4', 'MAHUGA', '1HSD'];
      const newBadge = NEW_CODES.includes(col.code) ? '<span class="th-new-badge">新</span>' : '';

      // v1.11 — 公司 logo:有 logoUrl 就用 <img>、沒有就 fallback 圓點(由 .th-company 的 ::before 處理)
      const hasLogo = !!(company.logoUrl);
      const logoHtml = hasLogo
        ? `<img class="th-logo" src="${company.logoUrl}" alt="${company.shortName || company.name || ''}" onerror="this.style.display='none';this.parentElement.classList.add('th-logo-failed')">`
        : '';
      const companyClass = hasLogo ? 'th-company has-logo' : 'th-company';

      // v1.23 — 亮點 badges(最便宜/CP最高/續保最高)
      const hlBadges = highlightBadges[_colIdx];
      const hlBlock = hlBadges ? `<div class="th-highlights">${hlBadges}</div>` : '';

      // 公司 th 用 colspan="2",讓下方男/女兩格對齊
      // v1.15b:內容包一層 .th-product-wrap (flex column),讓 th-amt + th-actions 釘到卡底部
      html += `<th class="th-product" colspan="2" style="--th-color: var(${colorVar})">
        <div class="th-product-wrap">
          ${logoHtml}
          <div class="${companyClass}">${company.shortName || company.name || ''}</div>
          <span class="th-code">${col.code}${newBadge}</span>
          <div class="th-name">${p.name || col.code}</div>
          ${hlBlock}
          <div class="th-amt" data-print-amt="${col.sel.amount}${showUnitOutside ? ' '+unit : ''}">${amtField}${showUnitOutside ? `<span class="unit">${unit}</span>` : ''}</div>
          <div class="th-actions">
            ${linkTpl.dm ? `<a class="th-link" href="${linkUrls('dm')}" target="_blank">DM</a>` : ''}
            ${linkTpl.clause ? `<a class="th-link" href="${linkUrls('clause')}" target="_blank">條款</a>` : ''}
            ${linkTpl.rate ? `<a class="th-link" href="${linkUrls('rate')}" target="_blank">費率</a>` : ''}
          </div>
        </div>
      </th>`;
    });
    html += '</tr></thead><tbody>';

    // 給付明細列 — 每家 1 個 td colspan=2
    // v1.10 — 全列都是空(—)時加 row-all-empty class,配合「隱藏空欄」按鈕
    rowDefs.forEach(rd => {
      let cellsHtml = '';
      let nonEmptyCount = 0;
      cols.forEach(col => {
        const r = rd.evaluator(col);
        if (r.kind === 'num') {
          nonEmptyCount++;
          const starCls = (state.showStar && r.star) ? ' star' : '';
          const tt = (r.tooltip || '').replace(/"/g,'&quot;');
          cellsHtml += `<td colspan="2"><span class="cell-val${starCls}"${tt ? ` data-tt="${tt}"` : ''}>${r.val.toLocaleString()}</span>${r.unit ? `<span class="cell-unit">${r.unit}</span>` : ''}</td>`;
        } else if (r.kind === 'rule') {
          nonEmptyCount++;
          const tt = (r.tooltip || '').replace(/"/g,'&quot;');
          cellsHtml += `<td colspan="2"><span class="cell-rule"${tt ? ` data-tt="${tt}"` : ''}>依條款</span></td>`;
        } else if (r.kind === 'bool') {
          // v1.16:條款認定範圍 ✓ / ✗
          nonEmptyCount++;
          const tt = (r.tooltip || '').replace(/"/g,'&quot;');
          if (r.val === true) {
            cellsHtml += `<td colspan="2"><span class="cell-bool cell-bool-yes"${tt ? ` data-tt="${tt}"` : ''}>✓</span></td>`;
          } else {
            cellsHtml += `<td colspan="2"><span class="cell-bool cell-bool-no"${tt ? ` data-tt="${tt}"` : ''}>✗</span></td>`;
          }
        } else if (r.kind === 'badge') {
          // v1.17:條款限制層級 — 橘紅(整條款限制)/ 中性藍(僅門診)
          nonEmptyCount++;
          const tt = (r.tooltip || '').replace(/"/g,'&quot;');
          const badgeCls = r.val === 'whole' ? 'cell-badge-whole' : 'cell-badge-outpt';
          cellsHtml += `<td colspan="2"><span class="cell-badge ${badgeCls}"${tt ? ` data-tt="${tt}"` : ''}>${r.label}</span></td>`;
        } else {
          cellsHtml += `<td colspan="2"><span class="cell-none">—</span></td>`;
        }
      });
      const extraCls = [];
      if (nonEmptyCount === 0) extraCls.push('row-all-empty');
      if (rd.isClauseScope) extraCls.push('row-clause-scope');
      const rowCls = extraCls.length ? ` class="${extraCls.join(' ')}"` : '';
      // v1.16:條款範圍列加副標
      const titleHtml = rd.rowSub
        ? `<strong>${rd.rowTitle}</strong><div class="row-clause-sub">${rd.rowSub}</div>`
        : rd.rowTitle;
      html += `<tr${rowCls}><td>${titleHtml}</td>${cellsHtml}</tr>`;
    });

    // ─── 分隔:當年保費 ───
    html += `<tr class="row-fee-divider row-fee-current"><td><strong>💰 當年保費</strong><div class="row-fee-sub">${age} 歲 ${gender==='F'?'女':'男'}</div></td>`;
    cpData.forEach(d => {
      html += `<td colspan="2" class="cell-fee">${d.feeCurrent !== null ? d.feeCurrent.toLocaleString() : '—'}<span class="cell-unit">元/年</span></td>`;
    });
    html += '</tr>';

    // ─── 從客戶年齡 → endAge 平均保費 ───
    html += `<tr class="row-fee-avg"><td><strong>📊 ${age}→${endAge} 歲平均</strong><div class="row-fee-sub">${endAge - age + 1} 年,總繳 ÷ 年數<br><span class="fee-disclaimer">※ 假設費率不變</span></div></td>`;
    cpData.forEach(d => {
      const c = d.fromClient;
      const totalK = c.total >= 10000 ? Math.round(c.total / 10000) + ' 萬' : c.total.toLocaleString();
      html += `<td colspan="2" class="cell-fee-avg">${c.avg > 0 ? c.avg.toLocaleString() : '—'}<span class="cell-unit">元/年</span><div class="cell-fee-sub">總繳 ${totalK}</div></td>`;
    });
    html += '</tr>';

    // ─── 從 0 → endAge 平均保費 ───
    html += `<tr class="row-fee-avg row-fee-zero"><td><strong>📊 0→${endAge} 歲平均</strong><div class="row-fee-sub">${endAge + 1} 年,終身平均<br><span class="fee-disclaimer">※ 假設費率不變</span></div></td>`;
    cpData.forEach(d => {
      const c = d.fromZero;
      const totalK = c.total >= 10000 ? Math.round(c.total / 10000) + ' 萬' : c.total.toLocaleString();
      html += `<td colspan="2" class="cell-fee-avg">${c.avg > 0 ? c.avg.toLocaleString() : '—'}<span class="cell-unit">元/年</span><div class="cell-fee-sub">總繳 ${totalK}</div></td>`;
    });
    html += '</tr>';

    // ─── CP 兩列(只用「客戶→上限」平均保費當分母,v1.10 加 mini bar)───
    const primaryLabel = cpData[0]?.primary?.label || '主打項';
    html += `<tr class="row-cp"><td><strong>${primaryLabel} CP</strong><div class="row-cp-sub">${primaryLabel} ÷ ${age}→${endAge} 平均</div></td>`;
    cpData.forEach(d => {
      const isBest = d.cpPrimary > 0 && d.cpPrimary === maxCpP;
      const pct = maxCpP > 0 ? Math.min(100, Math.round((d.cpPrimary / maxCpP) * 100)) : 0;
      const cpHtml = d.cpPrimary > 0
        ? `<div class="cp-wrap"><span class="cell-cp${isBest?' best':''}">${d.cpPrimary.toFixed(1)}</span><div class="cp-bar"><span style="width:${pct}%"></span></div></div>`
        : '<span class="cell-none">—</span>';
      html += `<td colspan="2">${cpHtml}</td>`;
    });
    html += '</tr>';

    html += `<tr class="row-cp"><td><strong>住院日額 CP</strong><div class="row-cp-sub">日額 ÷ ${age}→${endAge} 平均</div></td>`;
    cpData.forEach(d => {
      const isBest = d.cpDaily > 0 && d.cpDaily === maxCpD;
      const pct = maxCpD > 0 ? Math.min(100, Math.round((d.cpDaily / maxCpD) * 100)) : 0;
      const cpHtml = d.cpDaily > 0
        ? `<div class="cp-wrap"><span class="cell-cp${isBest?' best':''}">${d.cpDaily.toFixed(2)}</span><div class="cp-bar"><span style="width:${pct}%"></span></div></div>`
        : '<span class="cell-none">—</span>';
      html += `<td colspan="2">${cpHtml}</td>`;
    });
    html += '</tr>';

    // ═══════════════════════════════════════════════════════════════
    // v1.1: 費率明細(整合進主表底部) — 每家拆男/女兩欄
    // ═══════════════════════════════════════════════════════════════
    if (showFee) {
      // 分隔列(整列 navy 底,標題置左)
      const totalCols = 1 + cols.length * 2;
      html += `<tr class="row-fee-section-header"><td colspan="${totalCols}">📊 各年齡費率明細(0–80 歲)</td></tr>`;

      // 男/女 sub-header 列(年齡欄空白 + 每家 男♂ / 女♀)
      html += '<tr class="row-fee-subhead"><td class="age-axis-corner"></td>';
      cols.forEach(col => {
        html += `<th class="fa-th-male">男 ♂</th><th class="fa-th-female">女 ♀</th>`;
      });
      html += '</tr>';

      // 各年齡費率列
      // v1.15:純粹資訊揭露用,不再標當前年齡。每 5 歲一組(細虛線)、每 10 歲一組(實線粗)
      const tableMaxAge = Math.max(...cols.map(c => (c.product?.maxAgeContinuous || 80)));
      for (let a = 0; a <= tableMaxAge; a++) {
        // 刻度標記:每 5 歲 / 每 10 歲(用於分界線 & 年齡欄主刻度樣式)
        const isMajor = a % 10 === 0;       // 10 倍數 = 主刻度
        const isMinor = a % 5 === 0 && !isMajor;  // 5 倍數(非 10 倍) = 次刻度
        const cls = [
          'row-fee-detail',
          isMajor ? 'tick-major' : '',
          isMinor ? 'tick-minor' : ''
        ].filter(Boolean).join(' ');

        html += `<tr class="${cls}"><td class="age-cell">${a}<span class="age-unit">歲</span></td>`;
        cols.forEach(col => {
          const maxAge = col.product?.maxAgeContinuous || 80;
          const outOfRange = a > maxAge;
          const cid = col.sel.cid;
          // v1.6:有 renewalRates 的商品(M4D / RQ1)同格顯示「首年 / 續年」
          const hasRenewal = !!col.product?.renewalRates;
          let feeM = null, feeF = null;
          let feeMr = null, feeFr = null;  // 續年(只用於 hasRenewal)
          if (!outOfRange) {
            feeM = lookupPremium(col.product, col.sel.amount, a, 'M');
            feeF = lookupPremium(col.product, col.sel.amount, a, 'F');
            if (hasRenewal) {
              feeMr = lookupPremium(col.product, col.sel.amount, a, 'M', 'renewal');
              feeFr = lookupPremium(col.product, col.sel.amount, a, 'F', 'renewal');
            }
          }
          const oorCls = outOfRange ? 'out-of-range' : '';
          const fmt = (n) => (n !== null && n > 0) ? n.toLocaleString() : '—';
          let mDisp, fDisp;
          if (outOfRange) {
            mDisp = fDisp = '—';
          } else if (hasRenewal) {
            // 首/續雙值:第一行是首年(主),第二行是續年(淡色小字)
            mDisp = `<span class="fee-first">${fmt(feeM)}</span><span class="fee-renew">續 ${fmt(feeMr)}</span>`;
            fDisp = `<span class="fee-first">${fmt(feeF)}</span><span class="fee-renew">續 ${fmt(feeFr)}</span>`;
          } else {
            mDisp = fmt(feeM);
            fDisp = fmt(feeF);
          }
          const dualCls = hasRenewal ? 'fee-dual' : '';
          html += `<td class="fee-cell male-col ${oorCls} ${dualCls}" style="--company-color: var(--c-${cid});">${mDisp}</td>`;
          html += `<td class="fee-cell female-col ${oorCls} ${dualCls}">${fDisp}</td>`;
        });
        html += '</tr>';
      }
    }

    html += '</tbody>';
    table.innerHTML = html;

    // 綁定保額即時重算
    table.querySelectorAll('.th-amt input, .th-amt select').forEach(el => {
      const handler = (e) => {
        const code = e.target.dataset.code;
        if (state.selected[code]) {
          state.selected[code].amount = e.target.value;
          renderTable();
        }
      };
      el.addEventListener('change', handler);
      if (el.tagName === 'INPUT') el.addEventListener('input', handler);
    });

    // v1.1:費率區整合進主表,#fullAgeSection 隱藏不再使用
    const fullAgeSec = document.getElementById('fullAgeSection');
    if (fullAgeSec) fullAgeSec.style.display = 'none';
  }

  /* ─── 全年齡保費表(v1.0):單張統整表,N 家公司並排 ─── */
  function renderFullAgeTable(cols) {
    const wrap = document.getElementById('fullAgeTable');
    const clientAgeRaw = parseInt(document.getElementById('clientAge').value, 10);
    const clientAge = Number.isFinite(clientAgeRaw) && clientAgeRaw >= 0 ? clientAgeRaw : 35;
    const clientGender = state.client.gender;

    if (!cols || cols.length === 0) { wrap.innerHTML = ''; return; }

    // 表格年齡範圍:0 → 各家最大 maxAgeContinuous(讓超出某家上限的格子顯示 dash)
    const tableMaxAge = Math.max(...cols.map(c => (c.product?.maxAgeContinuous || 80)));

    // ── colgroup(顯式宣告 1 + N×2 欄,避免 chrome 把 colspan 算錯) ──
    let colgroupHtml = '<colgroup>';
    colgroupHtml += '<col class="col-age">';
    cols.forEach(() => {
      colgroupHtml += '<col class="col-male"><col class="col-female">';
    });
    colgroupHtml += '</colgroup>';

    // ── thead(三層:公司名 / 商品代號+保額 / 男女) ──
    // 注意:用 fa- 前綴避免跟主比較表的 .th-company/.th-code 等 class 撞到。
    let theadHtml = '<thead>';

    // 第一層:左上角(空)+ 每家公司名(colspan=2)
    theadHtml += '<tr>';
    theadHtml += '<th class="fa-th-age fa-th-corner"></th>';
    cols.forEach(col => {
      const company = col.company || {};
      const cid = col.sel.cid;
      theadHtml += `<th colspan="2" class="fa-th-company" style="--company-color: var(--c-${cid});">${company.shortName || ''}</th>`;
    });
    theadHtml += '</tr>';

    // 第二層:左上角(空)+ 商品代號 + 保額 tag
    theadHtml += '<tr>';
    theadHtml += '<th class="fa-th-age fa-th-corner"></th>';
    cols.forEach(col => {
      const p = col.product || {};
      const amtUnit = p.amountUnit || '';
      theadHtml += `<th colspan="2" class="fa-th-code">${col.code}<span class="fa-amt-tag">${col.sel.amount}${amtUnit}</span></th>`;
    });
    theadHtml += '</tr>';

    // 第三層:左上角「年齡」+ 男 / 女
    theadHtml += '<tr>';
    theadHtml += '<th class="fa-th-age">年齡</th>';
    cols.forEach(() => {
      theadHtml += '<th class="fa-th-male">男 ♂</th><th class="fa-th-female">女 ♀</th>';
    });
    theadHtml += '</tr>';

    theadHtml += '</thead>';

    // ── tbody ──
    let tbodyHtml = '<tbody>';
    for (let age = 0; age <= tableMaxAge; age++) {
      const isMajor = age % 10 === 0;
      const isMinor = age % 5 === 0 && !isMajor;
      const cls = [
        isMajor ? 'tick-major' : '',
        isMinor ? 'tick-minor' : ''
      ].filter(Boolean).join(' ');

      tbodyHtml += `<tr class="${cls}">`;
      tbodyHtml += `<td class="age-cell">${age}<span class="age-unit">歲</span></td>`;

      cols.forEach(col => {
        const maxAge = col.product?.maxAgeContinuous || 80;
        const outOfRange = age > maxAge;
        const cid = col.sel.cid;

        let feeM = null, feeF = null;
        if (!outOfRange) {
          feeM = lookupPremium(col.product, col.sel.amount, age, 'M');
          feeF = lookupPremium(col.product, col.sel.amount, age, 'F');
        }

        const oorCls = outOfRange ? 'out-of-range' : '';

        const mDisp = outOfRange ? '—' : (feeM !== null && feeM > 0 ? feeM.toLocaleString() : '—');
        const fDisp = outOfRange ? '—' : (feeF !== null && feeF > 0 ? feeF.toLocaleString() : '—');

        // col-start 標在男欄,讓 CSS 畫公司分隔線
        tbodyHtml += `<td class="fee-cell male-col col-start ${oorCls}" style="--company-color: var(--c-${cid});">${mDisp}</td>`;
        tbodyHtml += `<td class="fee-cell female-col ${oorCls}">${fDisp}</td>`;
      });

      tbodyHtml += '</tr>';
    }
    tbodyHtml += '</tbody>';

    wrap.innerHTML = `
      <div class="full-age-scroll">
        <table>${colgroupHtml}${theadHtml}${tbodyHtml}</table>
      </div>
    `;
  }

  /* ═══ Bind ═══════════════════════════════════════ */

  function bindGlobals() {
    document.getElementById('customerMode').addEventListener('change', e => {
      state.customerMode = e.target.checked;
      document.body.classList.toggle('customer-mode', state.customerMode);
    });
    document.getElementById('showStar').addEventListener('change', e => {
      state.showStar = e.target.checked;
      renderTable();
    });
    // v1.14 — 列印頁眉頁腳更新
    function updatePrintHeaderFooter() {
      const phCat = document.getElementById('phCat');
      const phMeta = document.getElementById('phMeta');
      const phFooter = document.getElementById('printFooter');
      if (!phCat || !phMeta || !phFooter) return;
      const cat = state.categoryKey || '險種比較';
      const ageRaw = parseInt(document.getElementById('clientAge').value, 10);
      const age = Number.isFinite(ageRaw) && ageRaw >= 0 ? ageRaw : 35;
      const gen = state.client.gender === 'F' ? '女' : '男';
      const count = Object.keys(state.selected || {}).length;
      phCat.textContent = `${cat} ‧ ${count} 個商品對照`;
      phMeta.textContent = `客戶資料:${age} 歲 / ${gen} ‧ ※ 保費為平均年繳估算,假設費率不變`;
      const now = new Date();
      const ymd = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
      phFooter.textContent = `鼎綸恩宇 ‧ 險種比較系統 ‧ 列印日期:${ymd}`;
    }
    document.getElementById('btnPrint').addEventListener('click', () => {
      updatePrintHeaderFooter();
      window.print();
    });
    window.addEventListener('beforeprint', updatePrintHeaderFooter);

    // 客戶資料卡
    const ageInput = document.getElementById('clientAge');
    ageInput.addEventListener('input', () => {
      state.client.age = parseInt(ageInput.value, 10) || 0;
      renderTable();
    });
    document.getElementById('genderM').addEventListener('click', () => {
      state.client.gender = 'M';
      document.getElementById('genderM').classList.add('active');
      document.getElementById('genderF').classList.remove('active');
      renderTable();
    });
    document.getElementById('genderF').addEventListener('click', () => {
      state.client.gender = 'F';
      document.getElementById('genderF').classList.add('active');
      document.getElementById('genderM').classList.remove('active');
      renderTable();
    });

    // 全年齡保費表(工具列按鈕 — 預設展開狀態)
    const btnFullAge = document.getElementById('btnFullAge');
    btnFullAge.classList.toggle('active', state.ui.fullAgeExpanded);
    btnFullAge.textContent = state.ui.fullAgeExpanded ? '📊 收合全年齡表' : '📊 全年齡保費表';
    btnFullAge.addEventListener('click', () => {
      state.ui.fullAgeExpanded = !state.ui.fullAgeExpanded;
      btnFullAge.classList.toggle('active', state.ui.fullAgeExpanded);
      btnFullAge.textContent = state.ui.fullAgeExpanded ? '📊 收合全年齡表' : '📊 全年齡保費表';
      renderTable();
    });

    // v1.10 — 隱藏空欄(把整列全部「—」的列藏起來)
    const btnHideEmpty = document.getElementById('btnHideEmpty');
    btnHideEmpty.classList.toggle('active', state.ui.hideEmpty);
    btnHideEmpty.textContent = state.ui.hideEmpty ? '👁️ 顯示空欄' : '👁️ 隱藏空欄';
    btnHideEmpty.addEventListener('click', () => {
      state.ui.hideEmpty = !state.ui.hideEmpty;
      btnHideEmpty.classList.toggle('active', state.ui.hideEmpty);
      btnHideEmpty.textContent = state.ui.hideEmpty ? '👁️ 顯示空欄' : '👁️ 隱藏空欄';
      document.body.classList.toggle('hide-empty', state.ui.hideEmpty);
    });
    // 左側面板收合 / 展開
    const layout = document.querySelector('.main-layout');
    const collapseBtn = document.getElementById('pickerCollapseBtn');
    const reopenRail = document.getElementById('pickerReopenRail');
    const PICKER_COLLAPSED_KEY = 'ah_picker_collapsed';

    // 還原上次狀態
    try {
      if (localStorage.getItem(PICKER_COLLAPSED_KEY) === '1') {
        layout.classList.add('picker-collapsed');
      }
    } catch(e) { /* localStorage 可能被 disable,忽略 */ }

    function setPickerCollapsed(collapsed) {
      layout.classList.toggle('picker-collapsed', collapsed);
      try {
        localStorage.setItem(PICKER_COLLAPSED_KEY, collapsed ? '1' : '0');
      } catch(e) { /* ignore */ }
    }
    if (collapseBtn) collapseBtn.addEventListener('click', () => setPickerCollapsed(true));
    if (reopenRail) reopenRail.addEventListener('click', () => setPickerCollapsed(false));
  }

  /* ═══ Init ═══════════════════════════════════════ */

  async function init() {
    try {
      await load();
      renderCatTabs();
      switchCategory(state.categoryKey);
      bindGlobals();
    } catch (e) {
      document.getElementById('pickerBody').innerHTML = '<div class="picker-empty">載入失敗:' + e.message + '</div>';
      console.error(e);
    }
  }

  return { init, state, CATEGORIES };
})();

// Expose for debugging / testing
window.App = App;

document.addEventListener('DOMContentLoaded', App.init);
</script>
